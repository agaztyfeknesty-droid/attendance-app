<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    /* التنسيق ده عشان المربع يظهر صغير وعلى اليمين مظبوط */
    .show-pass-container {
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
      margin-top: 12px !important;
      margin-bottom: 12px !important;
      justify-content: flex-start !important;
      width: 100% !important;
      direction: rtl !important;
    }
    .show-pass-container input[type="checkbox"] {
      width: 18px !important;
      height: 18px !important;
      margin: 0 !important;
      cursor: pointer !important;
      display: inline-block !important;
    }
    .show-pass-container label {
      margin: 0 !important;
      font-size: 14px !important;
      color: #6b7280 !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      display: inline-block !important;
    }
  </style>
</head>
<body>

  <form id="loginForm">
    <img src="logo.png" alt="اجازتي في كنيستي" class="logo">

    <h1>تسجيل الدخول 🚪</h1>
    <p>ادخل بياناتك عشان تتابع رحلتك</p>

    <label for="studentCode">كود الطالب أو الاسم</label>
    <input type="text" id="studentCode" placeholder="مثال: M001" required>

    <label for="password">كلمة المرور</label>
    <input type="password" id="password" placeholder="********" required>

    <div class="show-pass-container">
      <input type="checkbox" id="showPassword">
      <label for="showPassword">إظهار كلمة المرور 👁️</label>
    </div>

    <button type="submit" style="margin-top: 10px;">دخول إلى حسابي</button>

    <p style="margin-top:18px; font-size:14px;">
      لسه معملتش حساب؟ <a href="signup.html" style="color:#36AEE0; font-weight:700; text-decoration:none;">سجل دلوقتي</a>
    </p>
    <p style="margin-top:8px; font-size:14px;">
      نسيت كلمة السر؟ <a href="resetpassword.html" style="color:#F2618C; font-weight:700; text-decoration:none;">استرجعها من هنا</a>
    </p>
  </form>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // تشغيل المربع السحري لإظهار وإخفاء الباسورد
    document.getElementById("showPassword").addEventListener("change", function() {
      const passwordInput = document.getElementById("password");
      if (this.checked) {
        passwordInput.type = "text"; // يحول الخانة لنص عادي فتبان
      } else {
        passwordInput.type = "password"; // يرجعها لنجوم ونقط
      }
    });

    document.getElementById("loginForm").addEventListener("submit", function(event) {
      event.preventDefault();
      const enteredCode = document.getElementById("studentCode").value.trim();
      const enteredPassword = document.getElementById("password").value.trim();

      db.collection("students").doc(enteredCode).get().then(function(docSnap) {
        if (docSnap.exists) {
          checkPassword(docSnap.data(), enteredPassword);
        } else {
          db.collection("students").where("name", "==", enteredCode).get().then(function(querySnap) {
            if (!querySnap.empty) {
              checkPassword(querySnap.docs[0].data(), enteredPassword);
            } else {
              alert("الكود أو الاسم غير موجود ❌");
            }
          });
        }
      });
    });

    function checkPassword(student, enteredPassword) {
      if (student.password === enteredPassword) {
        localStorage.setItem("loggedInStudent", JSON.stringify(student));
        window.location.href = "home.html";
      } else {
        alert("كلمة المرور غلط ❌");
      }
    }
  </script>

</body>
</html>
