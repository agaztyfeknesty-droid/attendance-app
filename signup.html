<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب جديد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    /* التنسيق ده عشان المربع يظهر صغير وعلى اليمين مظبوط */
    .show-pass-container {
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
      margin-top: 12px !important;
      margin-bottom: 12px !important;
      justify-content: flex-start !important;
      width: 100% !important;
      direction: rtl !important;
    }
    .show-pass-container input[type="checkbox"] {
      width: 18px !important;
      height: 18px !important;
      margin: 0 !important;
      cursor: pointer !important;
      display: inline-block !important;
    }
    .show-pass-container label {
      margin: 0 !important;
      font-size: 14px !important;
      color: #6b7280 !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      display: inline-block !important;
    }
  </style>
</head>
<body>

  <form id="signupForm">
    <img src="logo.png" alt="اجازتي في كنيستي" class="logo">
    <h1>إنشاء حساب جديد ✨</h1>
    <p class="sub-greeting">اكتب بياناتك والسيستم هيعملك كودك الخاص</p>

    <label for="fullName">اسمك بالكامل</label>
    <input type="text" id="fullName" placeholder="مثال: جون مينا غالي" required>

    <label for="newPassword">اختار كلمة مرور (باسورد)</label>
    <input type="password" id="newPassword" placeholder="********" required>

    <div class="show-pass-container">
      <input type="checkbox" id="showPassword">
      <label for="showPassword">إظهار كلمة المرور 👁️</label>
    </div>

    <button type="submit" id="submitBtn" style="margin-top: 10px;">إنشاء الحساب وتوليد الكود 🚀</button>
    
    <div id="successBox" style="display:none; margin-top:20px; padding:15px; background:#e8f5e9; border-radius:16px;">
      <p style="color:#2e7d32; font-weight:bold; margin-bottom:5px;">تم إنشاء الحساب بنجاح! ✅</p>
      <p style="color:#15213E; font-weight:bold; font-size:18px;">كودك الخاص هو: <span id="generatedCode" style="color:#36AEE0; font-family:'Changa'; font-size:22px;"></span></p>
      <p style="font-size:12px; color:#666;">احفظ الكود ده عشان هتعمل بيه تسجيل دخول بعد كده.</p>
    </div>

    <p style="margin-top:18px; font-size:14px;">
      عندك حساب بالفعل؟ <a href="index.html" style="color:#36AEE0; font-weight:700; text-decoration:none;">سجل دخول من هنا</a>
    </p>
  </form>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const form = document.getElementById("signupForm");
    const submitBtn = document.getElementById("submitBtn");

    // تشغيل المربع السحري لإظهار وإخفاء الباسورد
    document.getElementById("showPassword").addEventListener("change", function() {
      const passwordInput = document.getElementById("newPassword");
      if (this.checked) {
        passwordInput.type = "text";
      } else {
        passwordInput.type = "password";
      }
    });

    form.addEventListener("submit", function(event) {
      event.preventDefault();
      const fullName = document.getElementById("fullName").value.trim();
      const newPassword = document.getElementById("newPassword").value.trim();

      if (!fullName || !newPassword) {
        alert("لازم تملأ الخانات كلها ❌");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "جاري إنشاء كودك الخاص... ⏳";

      db.collection("students").get().then(function(querySnapshot) {
        const currentCount = querySnapshot.size;
        const nextNumber = currentCount + 1;
        const paddedNumber = String(nextNumber).padStart(3, '0');
        const generatedCode = "M" + paddedNumber;

        const newStudent = {
          code: generatedCode,
          name: fullName,
          password: newPassword,
          points: 0,
          streak: 0,
          lastAttendanceDate: ""
        };

        db.collection("students").doc(generatedCode).set(newStudent).then(function() {
          document.getElementById("generatedCode").textContent = generatedCode;
          document.getElementById("successBox").style.display = "block";
          localStorage.setItem("loggedInStudent", JSON.stringify(newStudent));

          setTimeout(function() {
            window.location.href = "home.html";
          }, 4000);
        }).catch(function(error) {
          alert("حصل مشكلة أثناء التسجيل، جرب تاني ❌");
          submitBtn.disabled = false;
          submitBtn.textContent = "إنشاء الحساب وتوليد الكود 🚀";
        });
      }).catch(function(error) {
        console.error("Error generating code: ", error);
        submitBtn.disabled = false;
      });
    });
  </script>

</body>
</html>
