<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب جديد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    .show-pass-container {
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
      margin-top: 12px !important;
      margin-bottom: 12px !important;
      justify-content: flex-start !important;
      width: 100% !important;
    }
    .show-pass-container input[type="checkbox"] {
      width: 18px !important;
      height: 18px !important;
      margin: 0 !important;
      cursor: pointer;
    }
    .show-pass-container label {
      margin: 0 !important;
      font-size: 14px !important;
      color: #cbd5e1 !important;
      cursor: pointer;
    }
    select {
      width: 100%;
      padding: 12px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      margin-top: 8px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    select option {
      background: #0f172a;
      color: white;
    }
  </style>
</head>
<body>

  <form id="signupForm">
    <img src="logo.png" alt="اجازتي في كنيستي" class="logo">
    <h1>حساب جديد 🚀</h1>
    <p class="sub-greeting">سجل بياناتك عشان تدخل المغامرة معنا!</p>

    <label for="fullName">اسمك الرباعي بالعربي</label>
    <input type="text" id="fullName" placeholder="مثال: ستيفن امجد عدلي .." required>

    <label for="studentPhone">رقم موبايلك (إن وجد)</label>
    <input type="tel" id="studentPhone" placeholder="01234567890">

    <label for="parentPhone">رقم موبايل ولي الأمر</label>
    <input type="tel" id="parentPhone" placeholder="01234567890" required>

    <label for="studentClass">اختر فصلك 🏫</label>
    <select id="studentClass" required>
      <option value="">-- اختر الفصل --</option>
      <option value="فصل 1 - الشهيد ابانوب (ابتدائي)">فصل 1 - الشهيد ابانوب (ابتدائي)</option>
      <option value="فصل 2 - الشهيد كيرياكوس (ابتدائي)">فصل 2 - الشهيد كيرياكوس (ابتدائي)</option>
      <option value="فصل 3 - دانيال النبي (اعدادي)">فصل 3 - دانيال النبي (اعدادي)</option>
      <option value="فصل 4 - تيموثاوس (اعدادي)">فصل 4 - تيموثاوس (اعدادي)</option>
    </select>

    <div id="groupWrapper" style="display: none; width: 100%;">
      <label for="studentGroup">اختر مجموعتك جوه الفصل 👥</label>
      <select id="studentGroup" required>
      </select>
    </div>

    <label for="newPassword">عمل كلمة مرور (باسورد)</label>
    <input type="password" id="newPassword" placeholder="اكتب رقم أو كلمة تفتكرها" required>

    <div class="show-pass-container">
      <input type="checkbox" id="showPassword">
      <label for="showPassword">إظهار كلمة المرور</label>
    </div>

    <button type="submit" id="submitBtn">إنشاء الحساب وحفظ كودي 🎯</button>
    
    <p style="text-align: center; margin-top: 15px; font-size: 14px;">
      عندك حساب؟ <a href="index.html" style="color: #00f2fe; text-decoration: none; font-weight: bold;">سجل دخول من هنا</a>
    </p>
  </form>

  <div id="successBox" class="success-overlay" style="display: none;">
    <div class="success-card">
      <div class="success-icon">🎉</div>
      <h2>مبروك يا بطل! تم التسجيل</h2>
      <p>كودك الشخصي السري هو:</p>
      <div id="generatedCode" class="code-badge">M000</div>
      <p style="font-size: 12px; color: #94a3b8; margin-top: 10px;">خذ لقطة شاشة (Screenshot) للكود ده عشان هتدخل بيه كل مرة!</p>
      <div class="loading-bar"><div class="progress"></div></div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById("showPassword").addEventListener("change", function() {
      const passInput = document.getElementById("newPassword");
      passInput.type = this.checked ? "text" : "password";
    });

    const classSelect = document.getElementById("studentClass");
    const groupWrapper = document.getElementById("groupWrapper");
    const groupSelect = document.getElementById("studentGroup");

    classSelect.addEventListener("change", function() {
      const selectedClass = classSelect.value;
      if (!selectedClass) {
        groupWrapper.style.display = "none";
        groupSelect.innerHTML = "";
        return;
      }

      groupSelect.innerHTML = '<option value="">-- اختر المجموعة --</option>';
      const groups = ["مجموعة 1", "مجموعة 2", "مجموعة 3"];
      
      groups.forEach(group => {
        const opt = document.createElement("option");
        opt.value = group;
        opt.textContent = group;
        groupSelect.appendChild(opt);
      });

      groupWrapper.style.display = "block";
    });

    document.getElementById("signupForm").addEventListener("submit", function(event) {
      event.preventDefault();
      
      const fullName = document.getElementById("fullName").value.trim();
      const studentPhone = document.getElementById("studentPhone").value.trim();
      const parentPhone = document.getElementById("parentPhone").value.trim();
      const newPassword = document.getElementById("newPassword").value.trim();
      const selectedClass = classSelect.value;
      const selectedGroup = groupSelect.value;

      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      submitBtn.textContent = "جاري الحفظ... ⏳";

      db.collection("students").get().then(function(querySnapshot) {
        const nextNumber = querySnapshot.size + 1;
        const generatedCode = "M" + String(nextNumber).padStart(3, '0');

        const newStudent = {
          code: generatedCode,
          name: fullName,
          phone: studentPhone,
          parentPhone: parentPhone,
          password: newPassword,
          class: selectedClass,
          group: selectedGroup,
          points: 0,
          streak: 0,
          attendanceCount: 0,
          lastAttendanceDate: "",
          avatar: "",
          badges: []
        };

        db.collection("students").doc(generatedCode).set(newStudent).then(function() {
          document.getElementById("generatedCode").textContent = generatedCode;
          document.getElementById("successBox").style.display = "block";
          localStorage.setItem("loggedInStudent", JSON.stringify(newStudent));

          setTimeout(function() {
            window.location.href = "home.html";
          }, 4000);
        });
      }).catch(err => {
        alert("حدث عطل أثناء التسجيل، حاول مرة أخرى ❌");
        submitBtn.disabled = false;
        submitBtn.textContent = "إنشاء الحساب وحفظ كودي 🎯";
      });
    });
  </script>
</body>
</html>
