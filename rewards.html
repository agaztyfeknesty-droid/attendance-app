<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عجلة الحظ 🎡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      padding: 20px 15px 90px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
    }
    .container { width: 100%; max-width: 400px; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .back-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      color: white;
      font-weight: 600;
    }
    .page-title {
      font-family: 'Changa', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fbbf24;
    }

    /* كارت النقاط */
    .points-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 16px;
      text-align: center;
      margin-bottom: 24px;
    }
    .points-card p { font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
    .points-card span {
      font-family: 'Changa', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: #fbbf24;
    }

    /* العجلة */
    .wheel-section {
      text-align: center;
      margin-bottom: 24px;
    }
    .wheel-section h2 {
      font-family: 'Changa', sans-serif;
      font-size: 22px;
      margin-bottom: 6px;
      color: #fbbf24;
    }
    .wheel-section p {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 20px;
    }
    .wheel-wrapper {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto 20px auto;
    }

    /* المؤشر */
    .wheel-pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 32px solid #f43f5e;
      z-index: 10;
      filter: drop-shadow(0 2px 4px rgba(244,63,94,0.5));
    }

    canvas#wheelCanvas {
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(251,191,36,0.3);
      border: 5px solid rgba(255,255,255,0.2);
    }

    /* زرار اللف */
    .spin-btn {
      width: 100%;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0f172a;
      border: none;
      padding: 16px;
      border-radius: 16px;
      font-family: 'Changa', sans-serif;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(251,191,36,0.4);
      transition: all 0.2s ease;
    }
    .spin-btn:hover { transform: scale(1.02); }
    .spin-btn:disabled {
      background: #374151;
      color: #6b7280;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* كارت النتيجة */
    .result-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 22px;
      text-align: center;
      margin-top: 20px;
      display: none;
    }
    .result-card.show { display: block; }
    .result-emoji { font-size: 48px; display: block; margin-bottom: 10px; }
    .result-title {
      font-family: 'Changa', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .result-desc { font-size: 14px; color: #94a3b8; }

    /* معلومة اليوم الواحد */
    .info-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #64748b;
      line-height: 1.7;
    }

    /* البار السفلي */
    .bottom-navbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 65px;
      background: #0f172a;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
    }
    .nav-link { text-decoration: none; color: #64748b; font-size: 11px; text-align: center; font-family: 'Cairo', sans-serif; }
    .nav-link.active { color: #fbbf24; font-weight: bold; }
    .nav-icon { display: block; font-size: 20px; margin-bottom: 2px; }
  </style>
</head>
<body>

  <div class="container">

    <div class="top-bar">
      <button class="back-btn" onclick="window.location.href='home.html'">⬅ رجوع</button>
      <span class="page-title">🎡 عجلة الحظ</span>
      <div style="width:60px;"></div>
    </div>

    <!-- رصيد النقاط -->
    <div class="points-card">
      <p>🪙 رصيدك الحالي</p>
      <span id="userPoints">0</span>
      <p>نقطة</p>
    </div>

    <!-- العجلة -->
    <div class="wheel-section">
      <h2>🎰 جرب حظك!</h2>
      <p>لفّة واحدة كل يوم — إيه اللي هتكسبه؟</p>
      <div class="wheel-wrapper">
        <div class="wheel-pointer"></div>
        <canvas id="wheelCanvas" width="280" height="280"></canvas>
      </div>
      <button class="spin-btn" id="spinBtn" onclick="spinWheel()">
        🎡 الف العجلة!
      </button>
    </div>

    <!-- النتيجة -->
    <div class="result-card" id="resultCard">
      <span class="result-emoji" id="resultEmoji">🎉</span>
      <p class="result-title" id="resultTitle"></p>
      <p class="result-desc" id="resultDesc"></p>
    </div>

    <!-- معلومة -->
    <div class="info-card">
      🎡 لفّة واحدة بس في اليوم<br>
      تعالى بكرة عشان تلف تاني! 🔄
    </div>

  </div>

  <div class="bottom-navbar">
    <a href="home.html" class="nav-link"><span class="nav-icon">🏠</span>الرئيسية</a>
    <a href="bible.html" class="nav-link"><span class="nav-icon">📖</span>الستريك</a>
    <a href="badges.html" class="nav-link"><span class="nav-icon">🏅</span>أوسمتي</a>
    <a href="store.html" class="nav-link"><span class="nav-icon">🛒</span>المتجر</a>
    <a href="leaderboard.html" class="nav-link"><span class="nav-icon">🏆</span>الصدارة</a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const student = JSON.parse(localStorage.getItem("loggedInStudent"));
    if (!student || !student.code) { window.location.href = "index.html"; }

    let currentPoints = 0;
    let isSpinning = false;

    // قطاعات العجلة
    const segments = [
      { label: "5 نقاط 🌟", points: 5, color: "#f43f5e", emoji: "🌟", title: "كسبت 5 نقاط!", desc: "برافو عليك! ✨" },
      { label: "حظ أوفر 🍀", points: 0, color: "#6b7280", emoji: "🍀", title: "حظ أوفر المرة الجاية!", desc: "محظوظ المرة الجاية إن شاء الله 😄" },
      { label: "10 نقاط 👑", points: 10, color: "#fbbf24", emoji: "👑", title: "كسبت 10 نقاط!", desc: "أنت محظوظ يا بطل! 🎉" },
      { label: "2 نقطة ✨", points: 2, color: "#3b82f6", emoji: "✨", title: "كسبت 2 نقطة!", desc: "حلوة بردو! 💙" },
      { label: "7 نقاط 🔥", points: 7, color: "#10b981", emoji: "🔥", title: "كسبت 7 نقاط!", desc: "ممتاز! استمر 🔥" },
      { label: "حظ أوفر 🍀", points: 0, color: "#6b7280", emoji: "🍀", title: "حظ أوفر المرة الجاية!", desc: "محظوظ المرة الجاية إن شاء الله 😄" }
    ];

    const numSegments = segments.length;
    const arc = (2 * Math.PI) / numSegments;
    let currentAngle = 0;

    // رسم العجلة
    function drawWheel(angle) {
      const canvas = document.getElementById("wheelCanvas");
      const ctx = canvas.getContext("2d");
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const radius = cx - 5;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < numSegments; i++) {
        const startAngle = angle + i * arc;
        const endAngle = startAngle + arc;

        // رسم القطاع
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = segments[i].color;
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.lineWidth = 2;
        ctx.stroke();

        // كتابة النص
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(startAngle + arc / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "white";
        ctx.font = "bold 13px Cairo, sans-serif";
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.shadowBlur = 3;
        ctx.fillText(segments[i].label, radius - 12, 5);
        ctx.restore();
      }

      // دايرة المركز
      ctx.beginPath();
      ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
      ctx.fillStyle = "#0f172a";
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.lineWidth = 3;
      ctx.stroke();

      // نجمة المركز
      ctx.fillStyle = "#fbbf24";
      ctx.font = "bold 18px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("⭐", cx, cy);
    }

    // أول رسمة
    drawWheel(currentAngle);

    // التاريخ بتوقيت مصر
    function getTodayString() {
      const now = new Date();
      const cairoTime = new Date(now.toLocaleString("en-US", { timeZone: "Africa/Cairo" }));
      const year = cairoTime.getFullYear();
      const month = String(cairoTime.getMonth() + 1).padStart(2, '0');
      const day = String(cairoTime.getDate()).padStart(2, '0');
      return year + "-" + month + "-" + day;
    }

    const todayString = getTodayString();

    // جلب بيانات الطالب
    db.collection("students").doc(student.code).get().then(function(doc) {
      if (!doc.exists) return;
      const data = doc.data();
      currentPoints = data.points || 0;
      document.getElementById("userPoints").textContent = currentPoints;

      // لو لف العجلة النهاردة بالفعل
      if (data.lastSpinDate === todayString) {
        const btn = document.getElementById("spinBtn");
        btn.disabled = true;
        btn.textContent = "🔒 لفيت النهاردة — تعالى بكرة!";
      }
    });

    // لف العجلة
    function spinWheel() {
      if (isSpinning) return;
      isSpinning = true;

      const btn = document.getElementById("spinBtn");
      btn.disabled = true;
      btn.textContent = "🎡 جاري اللف...";
      document.getElementById("resultCard").classList.remove("show");

      // اختيار عشوائي للقطاع
      const winningIndex = Math.floor(Math.random() * numSegments);

      // حساب الزاوية النهائية
      const extraSpins = 5; // 5 لفات كاملة
      const targetAngle = (extraSpins * 2 * Math.PI) +
        (2 * Math.PI - winningIndex * arc - arc / 2) - currentAngle;

      const totalAngle = currentAngle + targetAngle;
      const duration = 4000;
      const startTime = performance.now();
      const startAngle = currentAngle;

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);

        // Ease out
        const eased = 1 - Math.pow(1 - progress, 4);
        const angle = startAngle + targetAngle * eased;

        drawWheel(angle);

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          currentAngle = angle % (2 * Math.PI);
          isSpinning = false;
          showResult(winningIndex);
        }
      }

      requestAnimationFrame(animate);
    }

    function showResult(winningIndex) {
      const winner = segments[winningIndex];
      const newPoints = currentPoints + winner.points;

      // حفظ في Firebase
      db.collection("students").doc(student.code).update({
        points: newPoints,
        lastSpinDate: todayString
      }).then(function() {
        currentPoints = newPoints;
        document.getElementById("userPoints").textContent = newPoints;

        // عرض النتيجة
        document.getElementById("resultEmoji").textContent = winner.emoji;
        document.getElementById("resultTitle").textContent = winner.title;
        document.getElementById("resultDesc").textContent =
          winner.points > 0
            ? winner.desc + "\n🪙 رصيدك الجديد: " + newPoints + " نقطة"
            : winner.desc;
        document.getElementById("resultCard").classList.add("show");

        // تعطيل الزرار
        const btn = document.getElementById("spinBtn");
        btn.disabled = true;
        btn.textContent = "🔒 لفيت النهاردة — تعالى بكرة!";
      });
    }
  </script>

</body>
</html>
