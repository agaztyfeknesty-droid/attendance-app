<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تحدي السبت الأسبوعي 🎯</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #020617, #1e1b4b);
      min-height: 100vh;
      font-family: 'Cairo', sans-serif;
      color: #ffffff;
      margin: 0;
      padding: 20px 15px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 350px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    .progress-bar {
      background: rgba(255, 255, 255, 0.1);
      height: 8px;
      border-radius: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-fill {
      background: linear-gradient(90deg, #00f2fe, #4facfe);
      height: 100%;
      width: 20%;
      transition: width 0.3s ease;
    }

    .question-title {
      font-family: 'Changa', sans-serif;
      font-size: 18px;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 14px;
      border-radius: 16px;
      font-family: 'Cairo';
      font-size: 14px;
      cursor: pointer;
      text-align: right;
      transition: all 0.2s ease;
    }

    /* إنيميشنات الإجابات الصح والغلط 😍 */
    .option-btn.correct {
      background: #2bb673 !important;
      border-color: #2bb673 !important;
      box-shadow: 0 0 15px rgba(43, 182, 115, 0.5);
    }

    .option-btn.wrong {
      background: #f43f5e !important;
      border-color: #f43f5e !important;
      box-shadow: 0 0 15px rgba(244, 63, 94, 0.5);
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .back-btn {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 12px;
      border-radius: 16px;
      font-family: 'Cairo';
      font-weight: bold;
      width: 100%;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="glass-card" id="quizBox">
      <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #36AEE0;">
        <span id="questionNum">السؤال 1 من 5</span>
        <span>⏱️ تحدي السبت</span>
      </div>
      
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="question-title" id="questionText">جاري تحميل السؤال... 🤔</div>

      <div class="options-list" id="optionsContainer">
        </div>
    </div>

    <div class="glass-card" id="resultBox" style="display: none;">
      <span style="font-size: 50px;">🎉</span>
      <h2 style="font-family: 'Changa'; color: #00f2fe; margin: 10px 0;">أنهيت التحدي بنجاح!</h2>
      <p id="scoreText" style="font-size: 16px; font-weight: bold;"></p>
      <p id="pointsText" style="font-size: 14px; color: #2bb673; font-weight: bold;"></p>
      <button class="back-btn" onclick="window.location.href='home.html'">🏠 العودة للرئيسية</button>
    </div>

    <div class="glass-card" id="lockedBox" style="display: none;">
      <span style="font-size: 50px;">🔒</span>
      <h2 style="font-family: 'Changa'; color: #f43f5e; margin: 10px 0;">عفواً يا بطل!</h2>
      <p style="font-size: 14px;">أنت حليت مسابقة السبت المخصصة للأسبوع ده خلاص. استنى السبت الجاي عشان ينزل تحدي جديد ونقط جديدة! 🔥</p>
      <button class="back-btn" onclick="window.location.href='home.html'">🏠 العودة للرئيسية</button>
    </div>

  </div>

  <script>
    // تهيئة الفايربيز
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const currentStudent = JSON.parse(localStorage.getItem("loggedInStudent"));

    // 📋 هنا بنحط الـ 5 أسئلة بتوع كل أسبوع (تقدر تغيرهم من هنا بسهولة)
    const quizQuestions = [
      { q: "من هو كاتب سفر المزامير الرئيسي؟", options: ["سليمان الحكيم", "داود النبي", "موسى النبي", "إشعياء النبي"], correct: 1 },
      { q: "كم عدد آيات المزمور الأول؟", options: ["5 آيات", "8 آيات", "6 آيات", "10 آيات"], correct: 2 },
      { q: "مزمور 'الرب راعيّ فلا يعوزني شيء' هو المزمور رقم كم؟", options: ["23", "1", "50", "150"], correct: 0 },
      { q: "في المزمور الأول، يكون الرجل البار كشجرة مغروسة عند...؟", options: ["الصحراء", "مجاري المياه", "الجبال", "الوديان"], correct: 1 },
      { q: "ماذا يحدث لطريق الأشرار في نهاية المزمور الأول؟", options: ["تنجح", "تثبت", "تهلك", "تتغير"], correct: 2 }
    ];

    let currentQIndex = 0;
    let correctAnswersCount = 0;
    let canAnswer = true;

    // تشييك الحماية: هل الولد حل المسابقة الأسبوع ده؟
    db.collection("students").doc(currentStudent.code).get().then(doc => {
      if (doc.exists) {
        // تاريخ السبت الحالي (لو نفس تاريخ النهاردة متسجل يبقا قفل)
        let todayStr = new Date().toLocaleDateString('en-US');
        if (doc.data().lastQuizDate === todayStr) {
          document.getElementById("quizBox").style.display = "none";
          document.getElementById("lockedBox").style.display = "block";
        } else {
          loadQuestion();
        }
      }
    });

    function loadQuestion() {
      canAnswer = true;
      const currentQ = quizQuestions[currentQIndex];
      document.getElementById("questionNum").textContent = `السؤال ${currentQIndex + 1} من 5`;
      document.getElementById("progressFill").style.width = `${((currentQIndex + 1) / 5) * 100}%`;
      document.getElementById("questionText").textContent = currentQ.q;

      const container = document.getElementById("optionsContainer");
      container.innerHTML = "";

      currentQ.options.forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(index, btn);
        container.appendChild(btn);
      });
    }

    function checkAnswer(selectedIndex, clickedBtn) {
      if (!canAnswer) return;
      canAnswer = false;

      const currentQ = quizQuestions[currentQIndex];
      const buttons = document.querySelectorAll(".option-btn");

      if (selectedIndex === currentQ.correct) {
        clickedBtn.classList.add("correct");
        correctAnswersCount++;
      } else {
        clickedBtn.classList.add("wrong");
        buttons[currentQ.correct].classList.add("correct"); // إظهار الصح فين
      }

      // الانتقال للسؤال التالي بعد ثانية ونصف للاستمتاع بالتأثير البصري
      setTimeout(() => {
        currentQIndex++;
        if (currentQIndex < quizQuestions.length) {
          loadQuestion();
        } else {
          finishQuiz();
        }
      }, 1500);
    }

    function finishQuiz() {
      document.getElementById("quizBox").style.display = "none";
      document.getElementById("resultBox").style.display = "block";

      let pointsEarned = correctAnswersCount * 5; // 5 نقط لكل سؤال صح
      document.getElementById("scoreText").textContent = `لقد أجبت على ${correctAnswersCount} من 5 أسئلة بشكل صحيح!`;
      document.getElementById("pointsText").textContent = `🎁 أُضيف إلى رصيدك +${pointsEarned} نقطة فوراً!`;

      // تحديث الداتا في الفايربيز وقفل التحدي للأسبوع ده 🔐
      const studentRef = db.collection("students").doc(currentStudent.code);
      studentRef.get().then(doc => {
        let currentPoints = doc.data().points || 0;
        studentRef.update({
          points: currentPoints + pointsEarned,
          lastQuizDate: new Date().toLocaleDateString('en-US') // قفل التحدي
        });
      });
    }
  </script>
</body>
</html>
