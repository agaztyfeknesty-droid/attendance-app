<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - الطالب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    .welcome-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 25px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }
    .stat-box {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 16px;
      text-align: center;
    }
    .stat-num {
      font-size: 24px;
      font-weight: bold;
      font-family: 'Changa', sans-serif;
      margin-top: 5px;
    }
    .points-box .stat-num { color: #f4b731; }
    .streak-box .stat-num { color: #ef4444; }
    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #36AEE0;
      color: white;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      margin-bottom: 12px;
      transition: 0.3s;
    }
    .nav-btn.store-btn {
      background: linear-gradient(135deg, #7c5cfc 0%, #a855f7 100%);
      box-shadow: 0 4px 15px rgba(124, 92, 252, 0.3);
    }
  </style>
</head>
<body>

  <div class="container" style="max-width: 500px; margin: 20px auto; padding: 15px;">
    
    <div style="text-align: center;">
      <img src="logo.png" alt="اجازتي في كنيستي" class="logo" style="max-width: 100px;">
    </div>

    <!-- كارت الترحيب بالطالب -->
    <div class="welcome-card">
      <h2 id="studentName">يا مرحب بالبطل! 🔥</h2>
      <p style="color: #94a3b8; font-size: 14px; margin-top: 5px;">كودك الشخصي: <span id="studentCode" style="color: #00f2fe; font-weight: bold;">M000</span></p>
    </div>

    <!-- العدادات والدرجات لايف -->
    <div class="stats-grid">
      <div class="stat-box points-box">
        <div style="font-size: 14px; color: #94a3b8;">إجمالي النقاط 🪙</div>
        <div id="pointsCount" class="stat-num">0</div>
      </div>
      <div class="stat-box streak-box">
        <div style="font-size: 14px; color: #94a3b8;">أيام الستريك 🔥</div>
        <div id="streakCount" class="stat-num">0</div>
      </div>
    </div>

    <!-- أزرار التنقل والربط بالصفحات -->
    <div class="menu-list">
      <!-- زرار المتجر الجديد مضاف بالاستايل المتناسق -->
      <a href="store.html" class="nav-btn store-btn">🎁 متجر الجوائز والكانتين الجديد</a>
      
      <a href="leaderboard.html" class="nav-btn" style="background: #2bb673;">🏆 لوحة الصدارة والأبطال</a>
      <a href="quiz.html" class="nav-btn" style="background: #f4b731; color: #0f172a;">📝 دخول مسابقة اليوم</a>
    </div>

    <p style="text-align: center; margin-top: 25px;">
      <a href="#" id="logoutBtn" style="color: #ef4444; text-decoration: none; font-weight: bold; font-size: 14px;">تسجيل الخروج 🚪</a>
    </p>

  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // جلب بيانات الطالب المسجل حالياً
    const localStudent = JSON.parse(localStorage.getItem("loggedInStudent"));
    if (!localStudent) {
      window.location.href = "index.html";
    } else {
      document.getElementById("studentCode").textContent = localStudent.code;
    }

    // استماع لحظي لتحديث النقاط والستريك من الفايربيز مباشرة
    db.collection("students").doc(localStudent.code).onSnapshot(doc => {
      if (doc.exists) {
        const data = doc.data();
        document.getElementById("studentName").textContent = `يا مرحب بالبطل ${data.name.split(' ')[0]}! 🔥`;
        document.getElementById("pointsCount").textContent = data.points || 0;
        document.getElementById("streakCount").textContent = data.streak || 0;
      }
    });

    // زرار تسجيل الخروج
    document.getElementById("logoutBtn").addEventListener("click", function(e) {
      e.preventDefault();
      localStorage.removeItem("loggedInStudent");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
