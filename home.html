<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الصفحة الرئيسية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <form onsubmit="return false;">
    <img src="logo.png" alt="اجازتي في كنيستي" class="logo">

    <h1 id="welcomeMessage">أهلاً بيك! 👋</h1>
    <p class="sub-greeting">يلا نشوف رحلتك لحد دلوقتي ✨</p>

    <div class="stats">
      <div class="stat-box pink">
        <span class="stat-icon">⭐</span>
        <span class="stat-number" id="pointsValue">0</span>
        <span class="stat-label">نقطة</span>
      </div>
      <div class="streak-box">
        <span class="streak-flame">🔥</span>
        <span class="stat-number" id="streakValue">0</span>
        <span class="stat-label">يوم التزام</span>
      </div>
    </div>

    <p class="qr-title">📱 كارت الحضور بتاعك</p>
    <div id="qrcode" style="display: flex; justify-content: center; margin: 15px 0;"></div>
  </form>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">الرئيسية</span>
    </a>
    <a href="leaderboard.html" class="nav-item">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">الصدارة</span>
    </a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const localStudentData = localStorage.getItem("loggedInStudent");

    if (!localStudentData) {
      window.location.href = "index.html";
    } else {
      const loggedInUser = JSON.parse(localStudentData);

      // الاستماع للتغييرات في الفايربيس لايف (Real-time)
      db.collection("students").doc(loggedInUser.code).onSnapshot(function(doc) {
        if (doc.exists) {
          const student = doc.data();
          
          // تحديث الواجهة فوراً بالأرقام الجديدة
          document.getElementById("welcomeMessage").textContent = "أهلاً بيك يا " + student.name + " 👋";
          document.getElementById("pointsValue").textContent = student.points || 0;
          document.getElementById("streakValue").textContent = student.streak || 0;

          // مسح الـ QR القديم وإعادة رسمه بالـ Code المظبوط
          document.getElementById("qrcode").innerHTML = ""; 
          new QRCode(document.getElementById("qrcode"), {
            text: student.code,
            width: 160,
            height: 160
          });
          
          // تحديث بيانات التخزين المحلي كاحتياطي
          localStorage.setItem("loggedInStudent", JSON.stringify(student));
        }
      });
    }
  </script>

</body>
</html>
