<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الصفحة الرئيسية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <div style="max-width: 340px; margin: 0 auto; position: relative;">
    <form style="position: relative;" onsubmit="event.preventDefault();">
      <div id="menuBtn" style="position: absolute; left: 20px; top: 20px; font-size: 26px; cursor: pointer; color: #15213E; z-index: 10;">☰</div>

      <img src="logo.png" alt="اجازتي في كنيستي" class="logo">

      <div style="text-align: center; margin-bottom: 10px;">
        <img id="userHomeAvatar" src="" style="width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 3px solid #F4B731; display: none; margin: 0 auto 10px;">
        <h1 id="welcomeMessage">أهلاً بيك! 👋</h1>
      </div>
      
      <p class="sub-greeting">يلا نشوف رحلتك لحد دلوقتي ✨</p>

      <div class="stats">
        <div class="stat-box pink">
          <span class="stat-icon">⭐</span>
          <span class="stat-number" id="pointsValue">0</span>
          <span class="stat-label">نقطة</span>
        </div>
        <div class="streak-box">
          <span class="streak-flame">🔥</span>
          <span class="stat-number" id="streakValue">0</span>
          <span class="stat-label">يوم التزام</span>
        </div>
      </div>

      <button onclick="window.location.href='leaderboard.html'" style="background-color: #36AEE0; color: white; border: none; border-radius: 14px; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; box-shadow: 0 4px 12px rgba(54, 174, 224, 0.2); font-family: 'Cairo';">
        🏆 عرض لوحة الصدارة والترتيب لايف
      </button>

    

      <p class="qr-title">📱 كارت الحضور بتاعك</p>
      <div id="qrcode" style="display: flex; justify-content: center; margin-top: 10px; padding: 10px; background: white; border-radius: 12px;"></div>
    </form>
  </div>

  <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>ملفي الشخصي 👤</h2>
      <span id="closeBtn" style="font-size: 14px; cursor: pointer; font-weight: bold; color: #F2618C; background: #FCE8EE; padding: 4px 10px; border-radius: 8px;">إغلاق ❌</span>
    </div>
    
    <div class="sidebar-content">
      <div style="text-align: center; position: relative; margin-bottom: 20px;">
        <img id="profileAvatar" src="https://via.placeholder.com/100" style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 4px solid #36AEE0; margin: 0 auto;">
        <label for="avatarUpload" style="display: block; color: #36AEE0; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 8px;">📷 تغيير الصورة الشخصية</label>
        <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
      </div>

      <div class="info-group">
        <p><strong>الاسم:</strong> <span id="infoName">--</span></p>
        <p><strong>الكود:</strong> <span id="infoCode" style="color:#36AEE0; font-weight: bold;">--</span></p>
        <p><strong>الموبايل:</strong> <span id="infoPhone">--</span></p>
        <p><strong>ولي الأمر:</strong> <span id="infoParent">--</span></p>
      </div>

      <button id="logoutBtn" style="background-color: #F2618C; color: white; border: none; border-radius: 12px; width: 100%; padding: 10px; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 25px;">تسجيل الخروج 🚪</button>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">الرئيسية</span>
    </a>
    <a href="leaderboard.html" class="nav-item">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">الصدارة</span>
    </a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const studentData = localStorage.getItem("loggedInStudent");

    if (!studentData) {
      window.location.href = "index.html";
    } else {
      let student = JSON.parse(studentData);

      if (student.code) {
        new QRCode(document.getElementById("qrcode"), {
          text: student.code,
          width: 160,
          height: 160,
          colorDark : "#15213E",
          colorLight : "#ffffff",
          correctLevel : QRCode.CorrectLevel.H
        });
      }

      db.collection("students").doc(student.code).onSnapshot(function(doc) {
        if (doc.exists) {
          const liveData = doc.data();

          document.getElementById("welcomeMessage").textContent = "أهلاً بيك يا " + (liveData.name || "بطل") + " 👋";
          document.getElementById("pointsValue").textContent = liveData.points !== undefined ? liveData.points : 0;
          document.getElementById("streakValue").textContent = liveData.streak !== undefined ? liveData.streak : 0;

          if (liveData.avatar) {
            document.getElementById("userHomeAvatar").src = liveData.avatar;
            document.getElementById("userHomeAvatar").style.display = "block";
            document.getElementById("profileAvatar").src = liveData.avatar;
          } else {
            document.getElementById("userHomeAvatar").style.display = "none";
            document.getElementById("profileAvatar").src = "https://via.placeholder.com/100";
          }

          document.getElementById("infoName").textContent = liveData.name || "--";
          document.getElementById("infoCode").textContent = liveData.code || "--";
          document.getElementById("infoPhone").textContent = liveData.phone || "غير مسجل";
          document.getElementById("infoParent").textContent = liveData.parentPhone || "غير مسجل";

          localStorage.setItem("loggedInStudent", JSON.stringify(liveData));
        }
      });

      const sidebar = document.getElementById("sidebar");
      const menuBtn = document.getElementById("menuBtn");
      const closeBtn = document.getElementById("closeBtn");

      menuBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        sidebar.classList.add("open");
      });

      closeBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        sidebar.classList.remove("open");
      });

      document.addEventListener("click", function(event) {
        const isClickInsideSidebar = sidebar.contains(event.target);
        const isClickOnMenuBtn = menuBtn.contains(event.target);

        if (!isClickInsideSidebar && !isClickOnMenuBtn) {
          sidebar.classList.remove("open");
        }
      });

      document.getElementById("avatarUpload").addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onloadend = function() {
          const base64Image = reader.result;

          db.collection("students").doc(student.code).update({
            avatar: base64Image
          }).catch(err => alert("عطل في حفظ الصورة ❌"));
        }
        reader.readAsDataURL(file);
      });

      document.getElementById("logoutBtn").addEventListener("click", function() {
        localStorage.removeItem("loggedInStudent");
        window.location.href = "index.html";
      });
    }
  </script>
</body>
</html>
