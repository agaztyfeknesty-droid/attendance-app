<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الصفحة الرئيسية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <form style="position: relative;">
    <div id="menuBtn" style="position: absolute; left: 20px; top: 20px; font-size: 26px; cursor: pointer; color: #15213E; z-index: 10;">☰</div>

    <img src="logo.png" alt="اجازتي في كنيستي" class="logo">

    <div style="text-align: center; margin-bottom: 10px;">
      <img id="userHomeAvatar" src="" style="width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 3px solid #F4B731; display: none; margin: 0 auto 10px;">
      <h1 id="welcomeMessage">أهلاً بيك! 👋</h1>
    </div>
    
    <p class="sub-greeting">يلا نشوف رحلتك لحد دلوقتي ✨</p>

    <div class="stats">
      <div class="stat-box pink">
        <span class="stat-icon">⭐</span>
        <span class="stat-number" id=\"pointsValue\">0</span>
        <span class="stat-label">نقطة</span>
      </div>
      <div class="streak-box">
        <span class="streak-flame">🔥</span>
        <span class="stat-number" id="streakValue">0</span>
        <span class="stat-label">يوم التزام</span>
      </div>
    </div>

    <p class="qr-title">📱 كارت الحضور بتاعك</p>
    <div id="qrcode" style="display: flex; justify-content: center; margin-top: 10px;"></div>
  </form>

  <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>ملفي الشخصي 👤</h2>
      <span id="closeBtn" style="font-size: 28px; cursor: pointer;">&times;</span>
    </div>
    
    <div class="sidebar-content">
      <div style="text-align: center; position: relative; margin-bottom: 20px;">
        <img id="profileAvatar" src="https://via.placeholder.com/100" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid #36AEE0;">
        <label for="avatarUpload" style="display: block; color: #36AEE0; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 8px;">📷 تغيير الصورة الشخصية</label>
        <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
      </div>

      <div class="info-group">
        <p><strong>الاسم:</strong> <span id="infoName">--</span></p>
        <p><strong>كود الحساب:</strong> <span id="infoCode" style="color:#36AEE0; font-weight: bold;">--</span></p>
        <p><strong>رقم الموبايل:</strong> <span id="infoPhone">--</span></p>
        <p><strong>تليفون ولي الأمر:</strong> <span id="infoParent">--</span></p>
      </div>

      <button id="logoutBtn" style="background-color: #F2618C; margin-top: 30px; padding: 10px; font-size: 14px;">تسجيل الخروج 🚪</button>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">الرئيسية</span>
    </a>
    <a href="leaderboard.html" class="nav-item">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">الصدارة</span>
    </a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let studentData = localStorage.getItem("loggedInStudent");

    if (!studentData) {
      window.location.href = "index.html";
    } else {
      let student = JSON.parse(studentData);

      // عرض البيانات الأساسية في الصفحة
      document.getElementById("welcomeMessage").textContent = "أهلاً بيك يا " + student.name + " 👋";
      document.getElementById("pointsValue").textContent = student.points || 0;
      document.getElementById("streakValue").textContent = student.streak || 0;

      // إظهار الصورة لو موجودة
      if (student.avatar) {
        document.getElementById("userHomeAvatar").src = student.avatar;
        document.getElementById("userHomeAvatar").style.display = "block";
        document.getElementById("profileAvatar").src = student.avatar;
      }

      // توليد الـ QR Code بالكود التلقائي
      new QRCode(document.getElementById("qrcode"), {
        text: student.code,
        width: 180,
        height: 180,
        colorDark : "#15213E",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });

      // ملء بيانات الـ Sidebar المعروضة
      document.getElementById("infoName").textContent = student.name;
      document.getElementById("infoCode").textContent = student.code;
      document.getElementById("infoPhone").textContent = student.phone || "غير مسجل";
      document.getElementById("infoParent").textContent = student.parentPhone || "غير مسجل";

      // فتح وإغلاق القائمة الجانبية
      const sidebar = document.getElementById("sidebar");
      document.getElementById("menuBtn").addEventListener("click", () => sidebar.classList.add("open"));
      document.getElementById("closeBtn").addEventListener("click", () => sidebar.classList.remove("open"));

      // لوجيك رفع وتحويل الصورة الشخصية
      document.getElementById("avatarUpload").addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onloadend = function() {
          const base64Image = reader.result;
          
          // تحديث الصورة في الشاشة فوراً
          document.getElementById("profileAvatar").src = base64Image;
          document.getElementById("userHomeAvatar").src = base64Image;
          document.getElementById("userHomeAvatar").style.display = "block";

          // حفظها في الفايربيس
          db.collection("students").doc(student.code).update({
            avatar: base64Image
          }).then(() => {
            // تحديث الـ LocalStorage عشان تفضل محفوظة
            student.avatar = base64Image;
            localStorage.setItem("loggedInStudent", JSON.stringify(student));
          }).catch(err => alert("عطل في حفظ الصورة ❌"));
        }
        reader.readAsDataURL(file);
      });

      // تسجيل الخروج
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("loggedInStudent");
        window.location.href = "index.html";
      });
    }
  </script>
</body>
</html>
