<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>درجات المخدومين</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <form onsubmit="return false;">
    <img src="logo.png" alt="اجازتي في كنيستي" class="logo">
    <h1>درجات المخدومين 📊</h1>
    <p class="sub-greeting">كل الطلاب ونقاطهم الحالية لايف</p>

    <div id="list"></div>

    <a href="scan.html" style="display:block; margin-top:25px; color:#36AEE0; font-weight:700; text-decoration:none;">⬅ رجوع لتسجيل الحضور</a>
  </form>

  <script>
    // إعدادات الفايربيس
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const listDiv = document.getElementById("list");
    const avatarColors = ["#F2618C", "#36AEE0", "#F4B731", "#7C5CFC", "#2BB673"];

    // الاستماع الفوري والتلقائي (Real-time) لبيانات الطلاب
    db.collection("students").orderBy("points", "desc").onSnapshot(function(querySnapshot) {
      listDiv.innerHTML = ""; // مسح القائمة القديمة قبل التحديث
      
      let rank = 1;

      querySnapshot.forEach(function(doc) {
        const student = doc.data();
        const initial = student.name ? student.name.charAt(0).toUpperCase() : "⭐";
        const color = avatarColors[(rank - 1) % avatarColors.length];

        const row = document.createElement("div");
        row.className = "leader-row";
        row.innerHTML = `
          <div class="leader-rank">${rank}</div>
          <div class="leader-avatar" style="background-color: ${color};">${initial}</div>
          <div class="leader-info">
            <div class="leader-name">${student.name}</div>
            <div class="leader-streak" style="font-size:12px; color:#6b7280;">كود: ${student.code} | 🔥 ${student.streak || 0} أيام</div>
          </div>
          <div class="leader-points">${student.points || 0} ⭐</div>
        `;

        listDiv.appendChild(row);
        rank++;
      });
    }, function(error) {
      console.error("Error fetching students list: ", error);
    });
  </script>

</body>
</html>
