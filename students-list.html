<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>درجات المخدومين</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <form>
    <img src="logo.png" alt="اجازتي في كنيستي" class="logo">
    <h1>درجات المخدومين 📊</h1>
    <p class="sub-greeting">كل الطلاب ونقاطهم</p>

    <div id="list"></div>

    <a href="scan.html" style="display:block; margin-top:15px; color:#36AEE0; font-weight:700; text-decoration:none;">⬅ رجوع لتسجيل الحضور</a>
  </form>

  <script>
    if (localStorage.getItem("isAdminLoggedIn") !== "true") {
      window.location.href = "scan.html";
    }

    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const listDiv = document.getElementById("list");
    const avatarColors = ["#F2618C", "#36AEE0", "#F4B731", "#7C5CFC", "#2BB673"];

    db.collection("students").orderBy("points", "desc").get().then(function(querySnapshot) {
      let rank = 1;

      querySnapshot.forEach(function(doc) {
        const student = doc.data();
        const initial = student.name.charAt(0).toUpperCase();
        const color = avatarColors[(rank - 1) % avatarColors.length];

        const row = document.createElement("div");
        row.className = "leader-row";
        row.innerHTML =
          "<div class='leader-rank'>" + rank + "</div>" +
          "<div class='leader-avatar' style='background:" + color + "'>" + initial + "</div>" +
          "<div class='leader-name'>" + student.name + " (" + student.code + ")</div>" +
          "<div class='leader-points'>⭐" + student.points + " 🔥" + (student.streak || 0) + "</div>";

        listDiv.appendChild(row);
        rank++;
      });
    });
  </script>

</body>
</html>
