<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المتجر 🛒</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      padding: 20px 15px 90px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container { width: 100%; max-width: 400px; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .back-btn {
      background: #f1f5f9;
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      color: #334155;
      font-weight: 600;
    }
    .page-title {
      font-family: 'Changa', sans-serif;
      font-size: 18px;
      color: #0f172a;
      font-weight: 800;
    }
    .points-card {
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      border-radius: 20px;
      padding: 18px;
      text-align: center;
      color: white;
      margin-bottom: 20px;
    }
    .points-card p { font-size: 14px; opacity: 0.9; margin-bottom: 4px; }
    .points-card span {
      font-family: 'Changa', sans-serif;
      font-size: 40px;
      font-weight: 800;
    }
    .section-title {
      font-family: 'Changa', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
    }
    .unlimited-badge { background: #dcfce7; color: #166534; }
    .limited-badge { background: #fee2e2; color: #991b1b; }
    .items-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .item-card {
      background: white;
      border-radius: 16px;
      padding: 16px 12px;
      text-align: center;
      border: 2px solid #e2e8f0;
      position: relative;
      transition: all 0.2s ease;
    }
    .item-card.out-of-stock {
      opacity: 0.5;
      filter: grayscale(80%);
    }
    .item-emoji { font-size: 36px; display: block; margin-bottom: 8px; }
    .item-name {
      font-family: 'Changa', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 4px;
    }
    .item-price {
      font-size: 13px;
      color: #b45309;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .item-quantity {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .item-quantity.low { color: #dc2626; font-weight: 700; }
    .buy-btn {
      width: 100%;
      background: #0f172a;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .buy-btn:hover { background: #1e3a8a; }
    .buy-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .cantina-note {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal-card {
      background: white;
      border-radius: 24px;
      padding: 28px 22px;
      width: 100%;
      max-width: 340px;
      text-align: center;
    }
    .modal-emoji { font-size: 52px; display: block; margin-bottom: 12px; }
    .modal-title {
      font-family: 'Changa', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 8px;
    }
    .modal-desc { font-size: 14px; color: #64748b; margin-bottom: 6px; }
    .modal-price { font-size: 16px; color: #b45309; font-weight: 700; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-confirm {
      flex: 1;
      background: #10b981;
      color: white;
      border: none;
      padding: 13px;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .modal-cancel {
      flex: 1;
      background: #f1f5f9;
      color: #334155;
      border: none;
      padding: 13px;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .success-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1001;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .success-overlay.show { display: flex; }
    .success-card {
      background: white;
      border-radius: 24px;
      padding: 32px 22px;
      width: 100%;
      max-width: 340px;
      text-align: center;
    }
    .bottom-navbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 65px;
      background: white;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
    }
    .nav-link { text-decoration: none; color: #64748b; font-size: 11px; text-align: center; font-family: 'Cairo', sans-serif; }
    .nav-link.active { color: #0f172a; font-weight: bold; }
    .nav-icon { display: block; font-size: 20px; margin-bottom: 2px; }
  </style>
</head>
<body>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-card">
      <span id="modalEmoji" class="modal-emoji"></span>
      <h2 id="modalName" class="modal-title"></h2>
      <p class="modal-desc">هتستبدل نقاطك بالهدية دي</p>
      <p id="modalPrice" class="modal-price"></p>
      <div class="modal-btns">
        <button class="modal-confirm" onclick="confirmBuy()">✅ تأكيد</button>
        <button class="modal-cancel" onclick="closeModal()">❌ إلغاء</button>
      </div>
    </div>
  </div>

  <div id="successOverlay" class="success-overlay">
    <div class="success-card">
      <div style="font-size: 60px; margin-bottom: 12px;">🎉</div>
      <h2 style="font-family:'Changa'; font-size:22px; color:#0f172a; margin-bottom:8px;">تم الطلب بنجاح!</h2>
      <p style="font-size:14px; color:#64748b; margin-bottom:6px;">طلبك اتسجل وهيتسلم قريباً</p>
      <p id="remainingPoints" style="font-size:14px; color:#1e3a8a; font-weight:700; margin-bottom:20px;"></p>
      <button onclick="closeSuccess()" style="width:100%; background:#0f172a; color:white; border:none; padding:13px; border-radius:12px; font-family:'Cairo'; font-size:15px; font-weight:700; cursor:pointer;">
        🏠 رجوع للمتجر
      </button>
    </div>
  </div>

  <div class="container">

    <div class="top-bar">
      <button class="back-btn" onclick="window.location.href='home.html'">⬅ رجوع</button>
      <span class="page-title">🛒 المتجر</span>
      <div style="width:60px;"></div>
    </div>

    <div class="points-card">
      <p>🪙 رصيدك الحالي</p>
      <span id="userPoints">0</span>
      <p>نقطة</p>
    </div>

    <p class="section-title">
      🎀 هدايا متاحة دايماً
      <span class="section-badge unlimited-badge">Unlimited</span>
    </p>
    <div class="items-grid" id="unlimitedGrid"></div>

    <p class="section-title">
      👑 هدايا محدودة
      <span class="section-badge limited-badge">Limited</span>
    </p>
    <p style="font-size:12px; color:#64748b; margin-bottom:12px;">⚠️ الكميات محدودة — أسرع قبل ما تخلص!</p>
    <div class="items-grid" id="limitedGrid"></div>

  </div>

  <div class="bottom-navbar">
    <a href="home.html" class="nav-link"><span class="nav-icon">🏠</span>الرئيسية</a>
    <a href="bible.html" class="nav-link"><span class="nav-icon">📖</span>الستريك</a>
    <a href="badges.html" class="nav-link"><span class="nav-icon">🏅</span>أوسمتي</a>
    <a href="store.html" class="nav-link active"><span class="nav-icon">🛒</span>المتجر</a>
    <a href="leaderboard.html" class="nav-link"><span class="nav-icon">🏆</span>الصدارة</a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const student = JSON.parse(localStorage.getItem("loggedInStudent"));
    if (!student || !student.code) { window.location.href = "index.html"; }

    let currentPoints = 0;
    let selectedItem = null;

    const unlimitedItems = [
      { id: "hair_clip", emoji: "🎀", name: "توك الشعر", price: 35 },
      { id: "bracelet", emoji: "💎", name: "البريسليت", price: 70 },
      { id: "medal", emoji: "🏷️", name: "الميدالية", price: 50 },
      { id: "cantina", emoji: "🎫", name: "قسيمة كانتين 25 جنيه", price: 100, note: "مرتين كل أسبوع" }
    ];

    const limitedItemsBase = [
      { id: "sticky_notes", emoji: "🗒️", name: "Sticky Notes", price: 80, maxQty: 8 },
      { id: "skratchers", emoji: "🖍️", name: "Scratchers", price: 120, maxQty: 3 },
      { id: "boys_notebook", emoji: "📔", name: "Boys Notebook", price: 180, maxQty: 3 },
      { id: "girls_notebook", emoji: "📓", name: "Girls Notebook", price: 180, maxQty: 3 },
      { id: "uno", emoji: "🃏", name: "Uno", price: 280, maxQty: 5 },
      { id: "connect4", emoji: "🟡🔴", name: "Connect 4", price: 420, maxQty: 4 },
      { id: "ball", emoji: "⚽", name: "Football", price: 600, maxQty: 3 },
      { id: "watch", emoji: "⌚", name: "Watch", price: 800, maxQty: 2 },
      { id: "airpods", emoji: "🎧", name: "AirPods", price: 1000, maxQty: 1 }
    ];

    db.collection("students").doc(student.code).onSnapshot(function(doc) {
      if (doc.exists) {
        currentPoints = doc.data().points || 0;
        document.getElementById("userPoints").textContent = currentPoints;
      }
    });

    function renderUnlimited() {
      const grid = document.getElementById("unlimitedGrid");
      grid.innerHTML = "";
      unlimitedItems.forEach(function(item) {
        const canAfford = currentPoints >= item.price;
        const card = document.createElement("div");
        card.className = "item-card";
        card.innerHTML =
          "<span class='item-emoji'>" + item.emoji + "</span>" +
          "<p class='item-name'>" + item.name + "</p>" +
          "<p class='item-price'>🪙 " + item.price + " نقطة</p>" +
          (item.note ? "<p class='cantina-note'>(" + item.note + ")</p>" : "") +
          "<button class='buy-btn' " + (!canAfford ? "disabled" : "") + " onclick='openModal(\"" + item.id + "\", \"" + item.emoji + "\", \"" + item.name + "\", " + item.price + ", false)'>" +
          (canAfford ? "🛒 اشتري" : "نقاط غير كافية") + "</button>";
        grid.appendChild(card);
      });
    }

    function renderLimited() {
      const grid = document.getElementById("limitedGrid");
      grid.innerHTML = "";

      limitedItemsBase.forEach(function(item) {
        db.collection("storeItems").doc(item.id).get().then(function(doc) {
          let remainingQty = item.maxQty;

          if (doc.exists) {
            remainingQty = doc.data().remaining;
          } else {
            db.collection("storeItems").doc(item.id).set({
              name: item.name,
              remaining: item.maxQty,
              maxQty: item.maxQty
            });
          }

          const isOut = remainingQty <= 0;
          const canAfford = currentPoints >= item.price;
          const isLow = remainingQty <= 2 && remainingQty > 0;

          const card = document.createElement("div");
          card.className = "item-card" + (isOut ? " out-of-stock" : "");
          card.innerHTML =
            "<span class='item-emoji'>" + item.emoji + "</span>" +
            "<p class='item-name'>" + item.name + "</p>" +
            "<p class='item-price'>🪙 " + item.price + " نقطة</p>" +
            "<p class='item-quantity" + (isLow ? " low" : "") + "'>" +
            (isOut ? "❌ نفد المخزون" : "📦 متبقي: " + remainingQty + " قطعة") + "</p>" +
            "<button class='buy-btn' " + (isOut || !canAfford ? "disabled" : "") + " onclick='openModal(\"" + item.id + "\", \"" + item.emoji + "\", \"" + item.name + "\", " + item.price + ", true)'>" +
            (isOut ? "نفدت" : !canAfford ? "نقاط غير كافية" : "🛒 اشتري") + "</button>";
          grid.appendChild(card);
        });
      });
    }

    function openModal(id, emoji, name, price, isLimited) {
      selectedItem = { id, emoji, name, price, isLimited };
      document.getElementById("modalEmoji").textContent = emoji;
      document.getElementById("modalName").textContent = name;
      document.getElementById("modalPrice").textContent = price + " نقطة";
      document.getElementById("modalOverlay").classList.add("show");
    }

    function closeModal() {
      document.getElementById("modalOverlay").classList.remove("show");
      selectedItem = null;
    }

    function confirmBuy() {
      if (!selectedItem) return;

      const btn = document.querySelector(".modal-confirm");
      btn.disabled = true;
      btn.textContent = "جاري التنفيذ...";

      const newPoints = currentPoints - selectedItem.price;

      db.collection("students").doc(student.code).update({
        points: newPoints
      }).then(function() {

        const now = new Date();
        db.collection("orders").add({
          studentCode: student.code,
          studentName: student.name || "مخدوم",
          itemId: selectedItem.id,
          itemName: selectedItem.name,
          itemEmoji: selectedItem.emoji,
          price: selectedItem.price,
          isLimited: selectedItem.isLimited,
          status: "pending",
          timestamp: now.toLocaleDateString("ar-EG") + " - " + now.toLocaleTimeString("ar-EG", {hour: '2-digit', minute: '2-digit'})
        }).then(function() {

          if (selectedItem.isLimited) {
            db.collection("storeItems").doc(selectedItem.id).get().then(function(doc) {
              if (doc.exists) {
                const current = doc.data().remaining;
                db.collection("storeItems").doc(selectedItem.id).update({
                  remaining: Math.max(0, current - 1)
                });
              }
            });
          }

          closeModal();
          document.getElementById("remainingPoints").textContent = "رصيدك الجديد: " + newPoints + " نقطة";
          document.getElementById("successOverlay").classList.add("show");
          currentPoints = newPoints;
          btn.disabled = false;
          btn.textContent = "✅ تأكيد";
        });
      });
    }

    function closeSuccess() {
      document.getElementById("successOverlay").classList.remove("show");
      renderUnlimited();
      renderLimited();
    }

    db.collection("students").doc(student.code).get().then(function(doc) {
      if (doc.exists) {
        currentPoints = doc.data().points || 0;
        document.getElementById("userPoints").textContent = currentPoints;
        renderUnlimited();
        renderLimited();
      }
    });
  </script>

</body>
</html>
