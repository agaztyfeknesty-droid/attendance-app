<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أوسمتي 🏅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      padding: 20px 15px 90px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container { width: 100%; max-width: 400px; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .back-btn {
      background: #f1f5f9;
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      color: #334155;
      font-weight: 600;
    }

    .page-title {
      font-family: 'Changa', sans-serif;
      font-size: 18px;
      color: #0f172a;
      font-weight: 800;
    }

    /* كارت الملخص */
    .summary-card {
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      color: white;
      margin-bottom: 20px;
    }

    .summary-title {
      font-family: 'Changa', sans-serif;
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .summary-count {
      font-family: 'Changa', sans-serif;
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
    }

    .summary-sub {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 4px;
    }

    /* شبكة الأوسمة */
    .section-title {
      font-family: 'Changa', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 14px;
      padding-right: 4px;
    }

    .badges-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .badge-card {
      background: white;
      border-radius: 18px;
      padding: 18px 14px;
      text-align: center;
      border: 2px solid #e2e8f0;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    /* الوسام مقفول */
    .badge-card.locked {
      opacity: 0.4;
      filter: grayscale(100%);
    }

    /* الوسام مفتوح */
    .badge-card.unlocked {
      border-color: #fbbf24;
      box-shadow: 0 4px 16px rgba(251, 191, 36, 0.25);
    }

    .badge-card.unlocked::before {
      content: "✓";
      position: absolute;
      top: 8px;
      left: 10px;
      background: #10b981;
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    .badge-emoji {
      font-size: 36px;
      display: block;
      margin-bottom: 8px;
    }

    .badge-name {
      font-family: 'Changa', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .badge-desc {
      font-size: 11px;
      color: #64748b;
      line-height: 1.4;
    }

    .badge-card.unlocked .badge-name { color: #92400e; }

    /* شريط التقدم */
    .progress-section {
      background: white;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 20px;
      border: 1px solid #e2e8f0;
    }

    .progress-title {
      font-weight: 700;
      color: #0f172a;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .progress-item {
      margin-bottom: 14px;
    }

    .progress-item:last-child { margin-bottom: 0; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #334155;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .progress-bar-bg {
      background: #f1f5f9;
      border-radius: 10px;
      height: 8px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, #3b82f6, #1e3a8a);
      transition: width 0.8s ease;
    }

    /* البار السفلي */
    .bottom-navbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 65px;
      background: white;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
    }
    .nav-link { text-decoration: none; color: #64748b; font-size: 12px; text-align: center; }
    .nav-link.active { color: #0f172a; font-weight: bold; }
    .nav-icon { display: block; font-size: 20px; margin-bottom: 2px; }
  </style>
</head>
<body>

  <div class="container">

    <div class="top-bar">
      <button class="back-btn" onclick="window.location.href='home.html'">⬅ رجوع</button>
      <span class="page-title">🏅 أوسمتي</span>
      <div style="width:60px;"></div>
    </div>

    <!-- ملخص الأوسمة -->
    <div class="summary-card">
      <p class="summary-title">إجمالي الأوسمة المفتوحة</p>
      <span class="summary-count" id="totalBadges">0</span>
      <p class="summary-sub">من أصل 10 أوسمة</p>
    </div>

    <!-- شريط التقدم للأهداف القادمة -->
    <div class="progress-section">
      <p class="progress-title">📊 تقدمك نحو الأوسمة القادمة</p>

      <div class="progress-item">
        <div class="progress-label">
          <span>🔥 ستريك القراءة</span>
          <span id="streakProgress">0 / 30 يوم</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="streakBar" style="width:0%"></div>
        </div>
      </div>

      <div class="progress-item">
        <div class="progress-label">
          <span>✅ حضور الاجتماعات</span>
          <span id="attendanceProgress">0 / 18 اجتماع</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="attendanceBar" style="width:0%; background: linear-gradient(90deg, #10b981, #065f46);"></div>
        </div>
      </div>

      <div class="progress-item">
        <div class="progress-label">
          <span>⭐ النقاط</span>
          <span id="pointsProgress">0 / 500 نقطة</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="pointsBar" style="width:0%; background: linear-gradient(90deg, #f59e0b, #d97706);"></div>
        </div>
      </div>
    </div>

    <!-- الأوسمة -->
    <p class="section-title">🎖️ كل الأوسمة</p>
    <div class="badges-grid" id="badgesGrid">
      <!-- هتتولد من JavaScript -->
    </div>

  </div>

  <div class="bottom-navbar">
    <a href="home.html" class="nav-link"><span class="nav-icon">🏠</span>الرئيسية</a>
    <a href="bible.html" class="nav-link"><span class="nav-icon">📖</span>الستريك</a>
    <a href="badges.html" class="nav-link active"><span class="nav-icon">🏅</span>أوسمتي</a>
    <a href="leaderboard.html" class="nav-link"><span class="nav-icon">🏆</span>الصدارة</a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const student = JSON.parse(localStorage.getItem("loggedInStudent"));
    if (!student || !student.code) { window.location.href = "index.html"; }

    // قايمة كل الأوسمة وشروطها
    const allBadges = [
      {
        id: "first_login",
        emoji: "🌱",
        name: "البداية",
        desc: "سجّلت حسابك وبدأت رحلتك",
        check: function(data) { return true; } // كل حد مسجل يستاهله
      },
      {
        id: "first_read",
        emoji: "📖",
        name: "قارئ",
        desc: "قرأت أول أصحاح في مرقس",
        check: function(data) { return (data.bibleStreak || 0) >= 1 || data.lastBibleDate; }
      },
      {
        id: "streak_3",
        emoji: "🔥",
        name: "3 أيام نار",
        desc: "قرأت 3 أيام متتاليين",
        check: function(data) { return (data.bibleStreak || 0) >= 3; }
      },
      {
        id: "streak_7",
        emoji: "⚡",
        name: "أسبوع كامل",
        desc: "قرأت 7 أيام متتاليين",
        check: function(data) { return (data.bibleStreak || 0) >= 7; }
      },
      {
        id: "streak_15",
        emoji: "💎",
        name: "نصف شهر",
        desc: "قرأت 15 يوم متتالي",
        check: function(data) { return (data.bibleStreak || 0) >= 15; }
      },
      {
        id: "streak_30",
        emoji: "👑",
        name: "شهر الالتزام",
        desc: "قرأت 30 يوم متتالي — أسطورة!",
        check: function(data) { return (data.bibleStreak || 0) >= 30; }
      },
      {
        id: "first_attend",
        emoji: "✅",
        name: "حاضر",
        desc: "سجّلت حضورك في أول اجتماع",
        check: function(data) { return (data.attendanceCount || 0) >= 1; }
      },
      {
        id: "attend_5",
        emoji: "🏟️",
        name: "مواظب",
        desc: "حضرت 5 اجتماعات",
        check: function(data) { return (data.attendanceCount || 0) >= 5; }
      },
      {
        id: "points_100",
        emoji: "🌟",
        name: "نجم",
        desc: "جمعت 100 نقطة",
        check: function(data) { return (data.points || 0) >= 100; }
      },
      {
        id: "points_500",
        emoji: "🚀",
        name: "متميز",
        desc: "جمعت 500 نقطة — رائع!",
        check: function(data) { return (data.points || 0) >= 500; }
      }
    ];

    db.collection("students").doc(student.code).onSnapshot(function(doc) {
      if (!doc.exists) return;
      const data = doc.data();

      // تحديث شريط التقدم
      const streak = data.bibleStreak || 0;
      const attendance = data.attendanceCount || 0;
      const points = data.points || 0;

      document.getElementById("streakProgress").textContent = streak + " / 30 يوم";
      document.getElementById("attendanceProgress").textContent = attendance + " / 18 اجتماع";
      document.getElementById("pointsProgress").textContent = points + " / 500 نقطة";

      document.getElementById("streakBar").style.width = Math.min(100, (streak / 30) * 100) + "%";
      document.getElementById("attendanceBar").style.width = Math.min(100, (attendance / 18) * 100) + "%";
      document.getElementById("pointsBar").style.width = Math.min(100, (points / 500) * 100) + "%";

      // رسم الأوسمة
      const grid = document.getElementById("badgesGrid");
      grid.innerHTML = "";
      let unlockedCount = 0;
      const newlyUnlocked = [];

      allBadges.forEach(function(badge) {
        const isUnlocked = badge.check(data);
        if (isUnlocked) unlockedCount++;

        // نتحقق لو الوسام جديد (مش موجود في الداتا قبل كده)
        const earnedBadges = data.badges || [];
        const isNew = isUnlocked && !earnedBadges.includes(badge.id);
        if (isNew) { newlyUnlocked.push(badge.id); }

        const card = document.createElement("div");
        card.className = "badge-card " + (isUnlocked ? "unlocked" : "locked");
        card.innerHTML =
          "<span class='badge-emoji'>" + badge.emoji + "</span>" +
          "<p class='badge-name'>" + badge.name + "</p>" +
          "<p class='badge-desc'>" + badge.desc + "</p>";
        grid.appendChild(card);
      });

      document.getElementById("totalBadges").textContent = unlockedCount;

      // لو في أوسمة جديدة، احفظها في Firebase
      if (newlyUnlocked.length > 0) {
        const currentBadges = data.badges || [];
        const updatedBadges = currentBadges.concat(newlyUnlocked);
        db.collection("students").doc(student.code).update({
          badges: updatedBadges
        });
      }
    });
  </script>
</body>
</html>
