<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الصدارة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <form onsubmit="return false;">
    <img src="logo.png" alt="اجازتي في كنيستي" class="logo">
    <h1>لوحة الصدارة 🏆</h1>
    <p class="sub-greeting">مين أكتر واحد التزم؟ ✨</p>

    <div id="list"></div>
  </form>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">الرئيسية</span>
    </a>
    <a href="leaderboard.html" class="nav-item active">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">الصدارة</span>
    </a>
  </div>

  <script>
    // إعدادات الفايربيس الخاصة ببروجكت "أجازتي في كنيستي"
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const listDiv = document.getElementById("list");
    const avatarColors = ["#F2618C", "#36AEE0", "#F4B731", "#7C5CFC", "#2BB673"];

    // الاستماع لايف (Real-time) لجميع الطلاب وترتيبهم حسب النقاط تنازلياً
    db.collection("students").orderBy("points", "desc").onSnapshot(function(querySnapshot) {
      // مسح القائمة القديمة قبل إعادة الرسم لمنع التكرار
      listDiv.innerHTML = "";
      
      let rank = 1;
      const medals = ["🥇", "🥈", "🥉"];

      querySnapshot.forEach(function(doc) {
        const student = doc.data();
        
        // أول 3 هياخدوا ميداليات، والباقي أرقام عادية
        const medal = rank <= 3 ? medals[rank - 1] : rank;
        
        // جلب أول حرف من الاسم عشان الـ Avatar
        const initial = student.name ? student.name.charAt(0).toUpperCase() : "⭐";
        const color = avatarColors[(rank - 1) % avatarColors.length];

        // بناء صف الطالب في لوحة الصدارة
        const row = document.createElement("div");
        row.className = "leader-row";
        row.innerHTML = `
          <div class="leader-rank">${medal}</div>
          <div class="leader-avatar" style="background-color: ${color};">${initial}</div>
          <div class="leader-info">
            <div class="leader-name">${student.name}</div>
            <div class="leader-streak">${student.streak || 0} 🔥 يوم التزام</div>
          </div>
          <div class="leader-points">${student.points || 0} ⭐</div>
        `;

        listDiv.appendChild(row);
        rank++;
      });
    }, function(error) {
      console.error("Error listening to leaderboard: ", error);
    });
  </script>

</body>
</html>
