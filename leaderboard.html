<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الصدارة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <form>
    <img src="logo.png" alt="اجازتي في كنيستي" class="logo">
    <h1>لوحة الصدارة 🏆</h1>
    <p>أكتر الطلاب التزامًا ونقاطًا</p>

    <div id="list" style="text-align: right; margin-top: 15px;"></div>
  </form>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const listDiv = document.getElementById("list");

    db.collection("students").orderBy("points", "desc").get().then(function(querySnapshot) {
      let rank = 1;
      const medals = ["🥇", "🥈", "🥉"];

      querySnapshot.forEach(function(doc) {
        const student = doc.data();
        const medal = rank <= 3 ? medals[rank - 1] : rank;

        const row = document.createElement("div");
        row.style.cssText = "display:flex; justify-content:space-between; align-items:center; padding:12px; margin-bottom:8px; background:#FDF6E8; border-radius:14px;";
        row.innerHTML =
          "<span style='font-weight:700; color:#15213E;'>" + medal + " " + student.name + "</span>" +
          "<span style='color:#F2618C; font-weight:700;'>" + student.points + " نقطة</span>";

        listDiv.appendChild(row);
        rank++;
      });
    });
  </script>

</body>
</html>
