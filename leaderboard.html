<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الصدارة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      min-height: 100vh;
      margin: 0;
      padding: 20px 15px 90px 15px;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }
    form {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }
    .section-title {
      font-family: 'Changa', sans-serif;
      font-size: 18px;
      color: #00f2fe;
      margin: 25px 0 12px 0;
      text-align: right;
      border-right: 4px solid #00f2fe;
      padding-right: 8px;
    }
    /* ستايل كروت المجموعات المبتكر */
    .group-row {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .group-rank { 
      font-family: 'Changa', sans-serif;
      font-weight: 800; 
      font-size: 18px; 
      width: 40px; 
      text-align: center; 
      color: #cbd5e1;
    }
    .group-info { flex: 1; text-align: right; margin-right: 12px; }
    .group-name { font-weight: bold; color: white; font-size: 16px; }
    .group-class { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .group-points { font-family: 'Changa', sans-serif; font-weight: bold; color: #10b981; font-size: 17px; }
  </style>
</head>
<body>

  <form onsubmit="return false;">
    <img src="logo.png" alt="اجازتي في كنيستي" class="logo">
    <h1>لوحة الصدارة 🏆</h1>
    <p class="sub-greeting">مين أكتر مجموعة وفرد ملتزمين ومجمعين نقط؟ ✨</p>

    <div class="section-title">👥 صدارة المجموعات (إجمالي النقط)</div>
    <div id="groupsList"></div>

    <div class="section-title">👤 صدارة الأبطال (فردي)</div>
    <div id="list"></div>
  </form>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-text">الرئيسية</span>
    </a>
    <a href="quiz.html" class="nav-item">
      <span class="nav-icon">🎯</span>
      <span class="nav-text">المسابقة</span>
    </a>
    <a href="rewards.html" class="nav-item">
      <span class="nav-icon">🚀</span>
      <span class="nav-text">الجوائز</span>
    </a>
    <a href="leaderboard.html" class="nav-item active">
      <span class="nav-icon">🏆</span>
      <span class="nav-text">الصدارة</span>
    </a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const listDiv = document.getElementById("list");
    const groupsListDiv = document.getElementById("groupsList");
    const avatarColors = ["#ff4757", "#2ed573", "#1e90ff", "#ffa502", "#9b59b6"];

    // الاستماع اللحظي لكل الطلاب وترتيبهم حسب النقاط فردياً
    db.collection("students").orderBy("points", "desc").onSnapshot(function(querySnapshot) {
      listDiv.innerHTML = "";
      groupsListDiv.innerHTML = "";
      
      let rank = 1;
      const medals = ["🥇", "🥈", "🥉"];
      
      // كائن (Object) ذكي لتجميع نقاط المجموعات لايف من حسابات العيال
      let groupScores = {};

      querySnapshot.forEach(function(doc) {
        const student = doc.data();
        const sPoints = student.points || 0;
        const sClass = student.class || "بدون فصل";
        const sGroup = student.group || "بدون مجموعة";

        // تجميع نقاط المجموعة لو البيانات كاملة
        if(student.class && student.group) {
          const groupKey = `${sClass} - ${sGroup}`;
          if(!groupScores[groupKey]) {
            groupScores[groupKey] = { points: 0, class: sClass, group: sGroup };
          }
          groupScores[groupKey].points += sPoints;
        }

        // رسم صدارة الأفراد (القديمة بتاعتك مع تعديل إظهار الفصل والمجموعة)
        const medal = rank <= 3 ? medals[rank - 1] : rank;
        const initial = student.name ? student.name.charAt(0).toUpperCase() : "⭐";
        const color = avatarColors[(rank - 1) % avatarColors.length];

        const row = document.createElement("div");
        row.className = "leader-row";
        row.innerHTML = `
          <div class="leader-rank">${medal}</div>
          <div class="leader-avatar" style="background-color: ${color};">${initial}</div>
          <div class="leader-info">
            <div class="leader-name">${student.name}</div>
            <div class="leader-streak" style="font-size:11px; color:#94a3b8;">📍 ${sClass} | ${sGroup}</div>
          </div>
          <div class="leader-points">${sPoints} ⭐</div>
        `;
        listDiv.appendChild(row);
        rank++;
      });

      // تحويل كائن المجموعات لمصفوفة وترتيبها أوتوماتيك من الكبير للصغير
      let sortedGroups = Object.values(groupScores).sort((a, b) => b.points - a.points);
      
      let gRank = 1;
      sortedGroups.forEach(g => {
        const gMedal = gRank <= 3 ? medals[gRank - 1] : gRank;
        const gRow = document.createElement("div");
        gRow.className = "group-row";
        gRow.innerHTML = `
          <div class="group-rank">${gMedal}</div>
          <div class="group-info">
            <div class="group-name">${g.group}</div>
            <div class="group-class">${g.class}</div>
          </div>
          <div class="group-points">${g.points} 🎯</div>
        `;
        groupsListDiv.appendChild(gRow);
        gRank++;
      });
      
      if(sortedGroups.length === 0) {
        groupsListDiv.innerHTML = `<p style="text-align:center; color:#94a3b8; font-size:13px;">في انتظار تجميع نقاط المجموعات من حسابات الأبطال...</p>`;
      }
    });
  </script>
</body>
</html>
