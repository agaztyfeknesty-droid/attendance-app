<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم الخادم - الحضور والطباعة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    .admin-section {
      background: #ffffff;
      padding: 20px;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(21, 33, 62, 0.05);
      width: 100%;
      max-width: 600px;
      margin: 20px auto;
      text-align: center;
    }
    .student-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }
    .student-table th, .student-table td {
      border-bottom: 1px solid #eee;
      padding: 12px 8px;
      text-align: center;
      vertical-align: middle;
    }
    .student-table th {
      background-color: #FDF6E8;
      color: #15213E;
      font-weight: 700;
    }
    .print-btn {
      background-color: #36AEE0;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .print-btn:hover { background-color: #2da1d0; }
    
    /* زرار إعادة تشغيل الكاميرا */
    .restart-camera-btn {
      background-color: #15213E;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      display: none; /* مخفي وبيظهر بس لما الكاميرا تقفل */
      width: 100%;
      transition: background-color 0.3s;
    }
    .restart-camera-btn:hover {
      background-color: #36AEE0;
    }

    #printArea { display: none; }
    @media print {
      body * { display: none !important; }
      #printArea {
        display: flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: white;
      }
      #printArea .card {
        border: 3px dashed #15213E;
        padding: 30px;
        border-radius: 16px;
        text-align: center;
        width: 280px;
      }
      #printArea h2 { font-family: 'Changa', sans-serif; font-size: 22px; margin-bottom: 10px; }
      #printArea p { font-size: 16px; margin: 5px 0; font-weight: bold; }
    }
  </style>
</head>
<body>

  <div style="width: 100%; max-width: 600px; margin: 0 auto;">
    
    <div class="admin-section">
      <img src="logo.png" alt="اللوجو" class="logo" style="width: 60px;">
      <h1>لوحة الخادم الذكية 🔐</h1>
      <p class="sub-greeting">امسح كارت المخدوم لتسجيل الحضور لايف</p>
      
      <div id="reader" style="width: 100%; border-radius: 16px; overflow: hidden; border: none; background: #fafafa;"></div>
      
      <button id="restartCamBtn" class="restart-camera-btn" onclick="startScanning()">📷 افتح الكاميرا لمسح كود آخر</button>

      <div id="result" style="margin-top: 15px; font-weight: bold; font-size: 16px; min-height: 40px; padding: 10px;"></div>
    </div>

    <div class="admin-section">
      <h2 style="font-family: 'Changa'; font-size: 18px; text-align: right; color: #15213E; margin-bottom: 5px;">🖨️ كروت الـ QR والطباعة التلقائية</h2>
      <p style="font-size: 12px; color: #6b7280; text-align: right; margin-bottom: 15px;">أي مخدوم يسجل جديد هيظهر هنا فوراً بالـ QR بتاعه وتقدر تطبعه</p>
      
      <div style="overflow-x: auto;">
        <table class="student-table">
          <thead>
            <tr>
              <th>الاسم</th>
              <th>الكود</th>
              <th>الـ QR Code</th>
              <th>التحكم</th>
            </tr>
          </thead>
          <tbody id="studentTableBody">
            </tbody>
        </table>
      </div>
    </div>

  </div>

  <div id="printArea">
    <div class="card">
      <img src="logo.png" style="width: 50px; margin-bottom: 10px;">
      <h2 id="printTitle">إجازتي في كنيستي</h2>
      <p>المخدوم: <span id="printName">--</span></p>
      <p>الكود: <span id="printCode" style="color: #36AEE0;">--</span></p>
      <div id="printQrContainer" style="display: flex; justify-content: center; margin-top: 15px;"></div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // -------------------------------------------------------------
    // أولاً: تشغيل قراءة المخدومين لايف وتوليد الـ QR
    // -------------------------------------------------------------
    db.collection("students").onSnapshot(function(snapshot) {
      const tbody = document.getElementById("studentTableBody");
      tbody.innerHTML = ""; 

      snapshot.forEach(function(doc) {
        const student = doc.data();
        const row = document.createElement("tr");

        const nameCell = document.createElement("td");
        nameCell.textContent = student.name;
        row.appendChild(nameCell);

        const codeCell = document.createElement("td");
        codeCell.textContent = student.code;
        codeCell.style.fontWeight = "bold";
        codeCell.style.color = "#36AEE0";
        row.appendChild(codeCell);

        const qrCell = document.createElement("td");
        const qrDiv = document.createElement("div");
        qrDiv.style.display = "flex";
        qrDiv.style.justifyContent = "center";
        qrCell.appendChild(qrDiv);
        row.appendChild(qrCell);

        new QRCode(qrDiv, {
          text: student.code,
          width: 50,
          height: 50,
          colorDark : "#15213E",
          colorLight : "#ffffff"
        });

        const actionCell = document.createElement("td");
        const printBtn = document.createElement("button");
        printBtn.className = "print-btn";
        printBtn.textContent = "طباعة 🖨️";
        
        printBtn.addEventListener("click", function() {
          triggerPrintCard(student.name, student.code);
        });

        actionCell.appendChild(printBtn);
        row.appendChild(actionCell);

        tbody.appendChild(row);
      });
    });

    function triggerPrintCard(name, code) {
      document.getElementById("printName").textContent = name;
      document.getElementById("printCode").textContent = code;
      
      const printQrContainer = document.getElementById("printQrContainer");
      printQrContainer.innerHTML = ""; 

      new QRCode(printQrContainer, {
        text: code,
        width: 150,
        height: 150,
        colorDark : "#15213E",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });

      setTimeout(() => {
        window.print();
      }, 300);
    }

    // -------------------------------------------------------------
    // ثانياً: لوجيك الحضور الذكي مع القفل التلقائي للكاميرا 🛡️📷
    // -------------------------------------------------------------
    let html5QrcodeScanner;

    function onScanSuccess(decodedText, decodedResult) {
      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = `جاري فحص الكود: ${decodedText}.. ⏳`;
      resultDiv.style.color = "#15213E";
      
      // بمجرد قراءة الكود بنجاح -> اقفل الكاميرا فوراً لإراحة الجهاز ومنع التكرار
      html5QrcodeScanner.clear().then(() => {
        document.getElementById("restartCamBtn").style.display = "block"; // أظهر زرار فتح الكاميرا تاني
      }).catch(error => console.error("Failed to clear scanner", error));

      const studentRef = db.collection("students").doc(decodedText);
      
      studentRef.get().then((doc) => {
        if (doc.exists) {
          const data = doc.data();
          const todayDate = new Date().toLocaleDateString('en-US');
          
          if (data.lastAttendanceDate === todayDate) {
            resultDiv.innerHTML = `❌ المخدوم: <span style="color:#F2618C;">${data.name}</span> <br> مسجل حضور النهاردة بالفعل!`;
            resultDiv.style.color = "#F2618C";
            return; 
          }

          let currentPoints = data.points || 0;
          let currentStreak = data.streak || 0;
          
          currentPoints += 10;
          currentStreak += 1;

          studentRef.update({
            points: currentPoints,
            streak: currentStreak,
            lastAttendanceDate: todayDate 
          }).then(() => {
            resultDiv.innerHTML = `✅ تم تسجيل حضور المخدوم: <br> <span style="color:#15213E;">${data.name}</span> <br> وأخد +10 نقاط! 🎉`;
            resultDiv.style.color = "#2BB673";
          });
        } else {
          resultDiv.innerHTML = `❌ الكود ده مش مسجل في السيستم!`;
          resultDiv.style.color = "#F2618C";
        }
      }).catch((error) => {
        resultDiv.innerHTML = `❌ حدث خطأ أثناء الاتصال بالسيستم.`;
        resultDiv.style.color = "#F2618C";
      });
    }

    function onScanFailure(error) {
      // سيبها فاضية
    }

    // دالة لتشغيل الكاميرا من جديد
    function startScanning() {
      document.getElementById("restartCamBtn").style.display = "none"; // اخفي زرار الفتح تاني طالما اشتغلت
      document.getElementById("result").innerHTML = ""; // صفي ريزلت القديم لحين مسح جديد
      
      html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }, false);
      html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    // تشغيل الكاميرا أول ما الصفحة تفتح أوتوماتيك لأول مرة
    startScanning();
  </script>
</body>
</html>
