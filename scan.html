<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قارئ الـ QR والتحكم - الخدام 👑</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            font-family: 'Cairo', sans-serif;
            color: white;
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 360px; }
        .admin-nav-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #020617;
            border: none;
            border-radius: 16px;
            padding: 14px;
            width: 100%;
            font-family: 'Changa', sans-serif;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .admin-nav-btn:active { transform: scale(0.97); }
        .scanner-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }
        #reader { width: 100%; border-radius: 16px; overflow: hidden; border: none !important; }
        .result-box {
            background: rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 15px;
            margin-top: 15px;
            font-size: 14px;
            text-align: right;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .student-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .student-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00f2fe;
        }
        .students-list-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .list-header h3 { font-family: 'Changa', sans-serif; margin: 0; color: #00f2fe; font-size: 16px; }
        .counter-badge { background: #4facfe; color: #020617; padding: 2px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        .student-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .student-item p { margin: 3px 0; }
        .student-name-row { font-weight: bold; color: #2bb673; font-size: 14px; display: flex; justify-content: space-between; }
        .parent-phone { color: #cbd5e1; font-size: 12px; }
        .qr-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            border-radius: 10px;
            padding: 8px;
        }
        .qr-label {
            font-size: 11px;
            color: #64748b;
            margin-top: 5px;
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">

        <button class="admin-nav-btn" onclick="window.location.href='admin-quiz.html'">
            👑 تعديل لوحة تحكم أسئلة السبت 🚀
        </button>

        <div class="scanner-card">
            <h2 style="font-family:'Changa'; margin:0 0 15px 0; color:#4facfe;">📸 ماسح تسجيل الحضور</h2>
            <div id="reader"></div>
            <div id="result" class="result-box" style="text-align: center; color: #94a3b8;">
                مستعد لقراءة كارت المخدوم... 📱
            </div>
        </div>

        <div class="students-list-card">
            <div class="list-header">
                <h3>👥 المخدومين المسجلين بالسيستم</h3>
                <span class="counter-badge" id="studentCounter">0 مخدوم</span>
            </div>
            <div id="studentsContainer" style="max-height: 600px; overflow-y: auto; padding-left: 5px;">
                <p style="text-align: center; color: #94a3b8; font-size: 13px;">جاري تحميل القائمة... 🔄</p>
            </div>
        </div>

        <!-- قسم طلبات المتجر -->
        <div style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; margin-top: 20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">
                <h3 style="font-family:'Changa'; color:#fbbf24; margin:0; font-size:16px;">🛒 طلبات المتجر</h3>
                <span id="ordersCounter" style="background:#f43f5e; color:white; padding:2px 10px; border-radius:20px; font-weight:bold; font-size:12px;">0 طلب</span>
            </div>
            <div id="ordersContainer">
                <p style="text-align:center; color:#94a3b8; font-size:13px;">جاري التحميل...</p>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
            authDomain: "agazty-feknesty.firebaseapp.com",
            projectId: "agazty-feknesty",
            storageBucket: "agazty-feknesty.firebasestorage.app",
            messagingSenderId: "1065028327259",
            appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let isScanning = true;

        function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning) return;
            isScanning = false;

            const resultContainer = document.getElementById('result');
            resultContainer.innerHTML = `<div style="text-align:center;">⏳ جاري فحص الحضور والتأمين...</div>`;

            const todayStr = new Date().toLocaleDateString('en-US');

            db.collection("students").doc(decodedText).get().then(doc => {
                if(doc.exists) {
                    const student = doc.data();
                    let currentCount = student.attendanceCount || 0;

                    if (student.lastAttendanceDate === todayStr) {
                        resultContainer.innerHTML = `
                            <div style="text-align:right; border-right: 3px solid #f43f5e; padding-right:8px;">
                                <p style="margin:0; font-weight:bold; color:#f43f5e; font-size:15px;">⚠️ مسجل حضور بالفعل اليوم!</p>
                                <p style="margin:4px 0 0 0; font-size:13px; color:white;">المخدوم: <b>${student.name}</b></p>
                                <p style="margin:2px 0 0 0; font-size:12px; color:#4facfe;">📊 رصيد مواظبته الحالية: <b>${currentCount} من إجمالي 18 يوم</b></p>
                            </div>
                        `;
                    } else {
                        let currentPoints = student.points || 0;
                        let newPoints = currentPoints + 10;
                        let newCount = currentCount + 1;

                        db.collection("students").doc(decodedText).update({
                            points: newPoints,
                            attendanceCount: newCount,
                            lastAttendanceDate: todayStr
                        }).then(() => {
                            resultContainer.innerHTML = `
                                <div class="student-profile">
                                    <img class="student-avatar" src="${student.avatar || 'https://via.placeholder.com/100'}" alt="Avatar">
                                    <div>
                                        <h3 style="margin:0; font-size:15px; color:#2bb673;">✅ تم تسجيل الحضور بنجاح</h3>
                                        <p style="margin:4px 0 0 0; font-weight:bold; color:white; font-size:14px;">${student.name}</p>
                                    </div>
                                </div>
                                <div style="text-align:right; font-size:13px;">
                                    <p style="margin:2px 0;"><strong>رقم ولي الأمر:</strong> ${student.parentPhone || 'غير مسجل'}</p>
                                    <p style="margin:2px 0; color:#00f2fe;">🥇 المواظبة الحالية: <b>${newCount} من 18 يوم</b></p>
                                    <p style="margin:2px 0; color:#94a3b8;">🎯 إجمالي رصيد النقاط: ${newPoints} نقطة (+10)</p>
                                </div>
                            `;
                        });
                    }
                } else {
                    resultContainer.innerHTML = `<div style="text-align:center; color:#f43f5e; font-weight:bold;">❌ كود تالف أو غير مسجل بالسيستم!</div>`;
                }
                setTimeout(() => { isScanning = true; }, 3000);
            }).catch(err => {
                resultContainer.innerHTML = `<div style="text-align:center; color:#f43f5e;">❌ عطل بالسيرفر: ${err.message}</div>`;
                setTimeout(() => { isScanning = true; }, 3000);
            });
        }

        function listenToNewStudents() {
            db.collection("students").onSnapshot(snapshot => {
                const container = document.getElementById("studentsContainer");
                const counter = document.getElementById("studentCounter");

                counter.textContent = `${snapshot.size} مخدوم`;
                container.innerHTML = "";

                if (snapshot.empty) {
                    container.innerHTML = `<p style="text-align:center; color:#94a3b8; font-size:13px;">لا يوجد مخدومين مسجلين حالياً.</p>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const studentId = doc.id;
                    const count = data.attendanceCount || 0;
                    const qrDivId = "qr-" + studentId;

                    container.innerHTML += `
                        <div class="student-item">
                            <div class="student-name-row">
                                <span>👤 ${data.name || 'بدون اسم'}</span>
                                <span style="color:#00f2fe; font-size:12px;">🆔 ${studentId}</span>
                            </div>
                            <p class="parent-phone">📞 ولي الأمر: ${data.parentPhone || 'غير مسجل'}</p>
                            <p style="color:#cbd5e1; font-size:11px; margin:0 0 6px 0;">📊 الحضور: <b style="color:#00f2fe;">${count} / 18 يوم</b> | 🎯 النقاط: <b id="pts-${studentId}" style="color:#fbbf24;">${data.points || 0}</b> ن</p>
                            <div style="display:flex; gap:6px; margin-bottom:10px; align-items:center;">
                                <input type="number" id="addpts-${studentId}" placeholder="نقاط" min="1"
                                    style="flex:1; padding:8px 10px; border-radius:10px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.08); color:white; font-family:'Cairo',sans-serif; font-size:13px; text-align:center;">
                                <button onclick="addPoints('${studentId}', ${data.points || 0})"
                                    style="background:linear-gradient(135deg,#10b981,#065f46); color:white; border:none; padding:8px 14px; border-radius:10px; font-family:'Cairo',sans-serif; font-size:13px; font-weight:bold; cursor:pointer; white-space:nowrap;">
                                    ➕ أضف
                                </button>
                            </div>
                            <div class="qr-container">
                                <div id="${qrDivId}"></div>
                                <span class="qr-label">📲 كارت الحضور - ${data.name || studentId}</span>
                            </div>
                        </div>
                    `;

                    setTimeout(() => {
                        const qrEl = document.getElementById(qrDivId);
                        if (qrEl && qrEl.childElementCount === 0) {
                            new QRCode(qrEl, {
                                text: studentId,
                                width: 120,
                                height: 120,
                                colorDark: "#0f172a",
                                colorLight: "#ffffff",
                                correctLevel: QRCode.CorrectLevel.H
                            });
                        }
                    }, 100);
                });
            });
        }

        function addPoints(studentId, currentPoints) {
            const input = document.getElementById("addpts-" + studentId);
            const val = parseInt(input.value);
            if (!val || val <= 0) {
                alert("⚠️ اكتب عدد النقاط الأول!");
                return;
            }
            const newPoints = currentPoints + val;
            db.collection("students").doc(studentId).update({ points: newPoints }).then(() => {
                document.getElementById("pts-" + studentId).textContent = newPoints;
                input.value = "";
                alert("✅ تم إضافة " + val + " نقطة بنجاح!");
            }).catch(err => {
                alert("❌ حصل خطأ: " + err.message);
            });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 230 });
        html5QrcodeScanner.render(onScanSuccess);
        listenToNewStudents();

        // طلبات المتجر لايف
        db.collection("orders").where("status", "==", "pending").onSnapshot(function(snapshot) {
            const container = document.getElementById("ordersContainer");
            const counter = document.getElementById("ordersCounter");
            counter.textContent = snapshot.size + " طلب";

            if (snapshot.empty) {
                container.innerHTML = '<p style="text-align:center; color:#94a3b8; font-size:13px;">مفيش طلبات جديدة ✅</p>';
                return;
            }

            container.innerHTML = "";
            snapshot.forEach(function(doc) {
                const order = doc.data();
                const div = document.createElement("div");
                div.style.cssText = "background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:12px; margin-bottom:10px;";
                div.innerHTML =
                    "<div style='display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;'>" +
                    "<span style='font-size:20px;'>" + (order.itemEmoji || "🎁") + "</span>" +
                    "<span style='background:" + (order.isLimited ? "#7c3aed" : "#065f46") + "; color:white; padding:2px 8px; border-radius:10px; font-size:10px;'>" +
                    (order.isLimited ? "Limited" : "Unlimited") + "</span>" +
                    "</div>" +
                    "<p style='color:white; font-weight:bold; font-size:14px; margin:0 0 3px 0;'>" + order.itemName + "</p>" +
                    "<p style='color:#00f2fe; font-size:12px; margin:0 0 3px 0;'>👤 " + order.studentName + " (" + order.studentCode + ")</p>" +
                    "<p style='color:#94a3b8; font-size:11px; margin:0 0 10px 0;'>⏰ " + order.timestamp + "</p>" +
                    "<button onclick='deliverOrder(\"" + doc.id + "\")' style='width:100%; background:#10b981; color:white; border:none; padding:9px; border-radius:10px; font-family:Cairo; font-size:13px; font-weight:bold; cursor:pointer;'>✅ تم التسليم</button>";
                container.appendChild(div);
            });
        });

        function deliverOrder(orderId) {
            db.collection("orders").doc(orderId).update({ status: "delivered" }).then(function() {
                alert("✅ تم تسليم الهدية بنجاح!");
            });
        }
    </script>
</body>
</html>
