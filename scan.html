<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قارئ الـ QR والتحكم - الخدام 👑</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            font-family: 'Cairo', sans-serif;
            color: white;
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 360px; }
        
        /* زرار تعديل لوحة تحكم الأسئلة النيون كما بالصورة */
        .admin-nav-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #020617;
            border: none;
            border-radius: 16px;
            padding: 14px;
            width: 100%;
            font-family: 'Changa', sans-serif;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .admin-nav-btn:active { transform: scale(0.97); }

        .scanner-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }
        #reader { width: 100%; border-radius: 16px; overflow: hidden; border: none !important; }
        
        .result-box {
            background: rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 15px;
            margin-top: 15px;
            font-size: 14px;
            text-align: right;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 📋 ستايل خانة بيانات المخدومين المسجلين الجداد */
        .students-list-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .list-header h3 { font-family: 'Changa', sans-serif; margin: 0; color: #00f2fe; font-size: 16px; }
        .counter-badge { background: #4facfe; color: #020617; padding: 2px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        
        .student-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .student-item p { margin: 3px 0; }
        .student-name-row { font-weight: bold; color: #2bb673; font-size: 14px; display: flex; justify-content: space-between; }
        .parent-phone { color: #cbd5e1; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        
        <button class="admin-nav-btn" onclick="window.location.href='admin-quiz.html'">
            👑 تعديل لوحة تحكم أسئلة السبت 🚀
        </button>

        <div class="scanner-card">
            <h2 style="font-family:'Changa'; margin:0 0 15px 0; color:#4facfe;">📸 ماسح تسجيل الحضور</h2>
            <div id="reader"></div>
            <div id="result" class="result-box" style="text-align: center; color: #94a3b8;">
                مستعد لقراءة كارت المخدوم... 📱
            </div>
        </div>

        <div class="students-list-card">
            <div class="list-header">
                <h3>👥 المخدومين المسجلين بالسيستم</h3>
                <span class="counter-badge" id="studentCounter">0 مخدوم</span>
            </div>
            <div id="studentsContainer" style="max-height: 300px; overflow-y: auto; padding-left: 5px;">
                <p style="text-align: center; color: #94a3b8; font-size: 13px;">جاري تحميل القائمة... 🔄</p>
            </div>
        </div>

    </div>

    <script>
        // ربط السيرفر وقاعدة البيانات الموحدة
        const firebaseConfig = {
            apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
            authDomain: "agazty-feknesty.firebaseapp.com",
            projectId: "agazty-feknesty",
            storageBucket: "agazty-feknesty.firebasestorage.app",
            messagingSenderId: "1065028327259",
            appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let isScanning = true;

        // 🔒 كود سحب الحضور والتأمين الأصلي والمقفل ضد خدع الـ QR
        function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning) return;
            isScanning = false; 

            const resultContainer = document.getElementById('result');
            resultContainer.innerHTML = `<div style="text-align:center;">⏳ جاري فحص وتأمين الكود...</div>`;
            
            db.collection("students").doc(decodedText).get().then(doc => {
                if(doc.exists) {
                    const student = doc.data();
                    let currentPoints = student.points || 0;
                    let newPoints = currentPoints + 10; 

                    db.collection("students").doc(decodedText).update({
                        points: newPoints
                    }).then(() => {
                        resultContainer.innerHTML = `
                            <div style="text-align:right; border-right: 3px solid #2bb673; padding-right:8px;">
                                <p style="margin:0; font-weight:bold; color:#2bb673; font-size:15px;">✅ تم الحضور: ${student.name}</p>
                                <p style="margin:4px 0 0 0; font-size:12px; color:#cbd5e1;">الرصيد الجديد: <b>${newPoints} نقطة</b></p>
                            </div>
                        `;
                    });
                } else {
                    resultContainer.innerHTML = `<div style="text-align:center; color:#f43f5e; font-weight:bold;">❌ كود تالف أو غير مسجل بالسيستم!</div>`;
                }
                setTimeout(() => { isScanning = true; }, 3000);
            }).catch(err => {
                resultContainer.innerHTML = `<div style="text-align:center; color:#f43f5e;">❌ عطل بالسيرفر: ${err.message}</div>`;
                setTimeout(() => { isScanning = true; }, 3000);
            });
        }

        // 🔄 دالة جلب وعرض الحسابات الجديدة لايف فوراً
        function listenToNewStudents() {
            db.collection("students").onSnapshot(snapshot => {
                const container = document.getElementById("studentsContainer");
                const counter = document.getElementById("studentCounter");
                
                counter.textContent = `${snapshot.size} مخدوم`;
                container.innerHTML = "";

                if (snapshot.empty) {
                    container.innerHTML = `<p style="text-align:center; color:#94a3b8; font-size:13px;">لا يوجد مخدومين مسجلين حالياً.</p>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const studentId = doc.id; // الكود الشخصي
                    
                    container.innerHTML += `
                        <div class="student-item">
                            <div class="student-name-row">
                                <span>👤 ${data.name || 'بدون اسم'}</span>
                                <span style="color:#00f2fe; font-size:12px;">🆔 ${studentId}</span>
                            </div>
                            <p class="parent-phone">📞 ولي الأمر: ${data.parentPhone || 'غير مسجل'}</p>
                            <p style="color:#94a3b8; font-size:11px; margin:0;">🎯 مجموع النقاط الحالية: ${data.points || 0} ن</p>
                        </div>
                    `;
                });
            });
        }

        // تشغيل السكنر وقائمة البيانات لايف
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 230 });
        html5QrcodeScanner.render(onScanSuccess);
        listenToNewStudents();
    </script>
</body>
</html>
