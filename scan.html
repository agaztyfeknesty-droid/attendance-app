<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قارئ الـ QR - الخدام 👑</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            font-family: 'Cairo', sans-serif;
            color: white;
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 350px; }
        
        /* 👑 زرار لينك لوحة تحكم الأسئلة الجديد الكريتيف */
        .admin-nav-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #020617;
            border: none;
            border-radius: 16px;
            padding: 14px;
            width: 100%;
            font-family: 'Changa', sans-serif;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .admin-nav-btn:active { transform: scale(0.97); }

        .scanner-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        #reader { width: 100%; border-radius: 16px; overflow: hidden; border: none !important; }
        .result-box {
            background: rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 12px;
            margin-top: 15px;
            font-size: 14px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <button class="admin-nav-btn" onclick="window.location.href='admin-quiz.html'">
            👑 تعديل لوحة تحكم أسئلة السبت 🚀
        </button>

        <div class="scanner-card">
            <h2 style="font-family:'Changa'; margin:0 0 15px 0; color:#4facfe;">📸 ماسح تسجيل الحضور</h2>
            <div id="reader"></div>
            <div class="result-box" id="result">مستعد لقراءة كارت المخدوم... 📱</div>
        </div>

    </div>

    <script>
        // تهيئة الفايربيز الموحد
        const firebaseConfig = {
            apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
            authDomain: "agazty-feknesty.firebaseapp.com",
            projectId: "agazty-feknesty",
            storageBucket: "agazty-feknesty.firebasestorage.app",
            messagingSenderId: "1065028327259",
            appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // تشغيل السكنر لوجيك التلقائي بتاعك
        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('result').innerHTML = `⏳ جاري تسجيل الكود: <b style="color:#00f2fe;">${decodedText}</b>`;
            
            db.collection("students").doc(decodedText).get().then(doc => {
                if(doc.exists) {
                    let currentPoints = doc.data().points || 0;
                    db.collection("students").doc(decodedText).update({
                        points: currentPoints + 10 // زيادة نقاط الحضور كمثال
                    }).then(() => {
                        document.getElementById('result').innerHTML = `✅ تم تسجيل حضور: <b style="color:#2bb673;">${doc.data().name}</b> (+10 ن)`;
                    });
                } else {
                    document.getElementById('result').innerHTML = `❌ الكود ده مش مسجل في السيستم!`;
                }
            }).catch(err => {
                document.getElementById('result').innerHTML = `❌ عطل في السيرفر: ${err.message}`;
            });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
