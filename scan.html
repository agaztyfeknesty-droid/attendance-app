<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قارئ الـ QR - الخدام 👑</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            font-family: 'Cairo', sans-serif;
            color: white;
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 350px; }
        
        /* زرار لوحة التحكم المدمج بستايل نيون شيك */
        .admin-nav-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #020617;
            border: none;
            border-radius: 16px;
            padding: 14px;
            width: 100%;
            font-family: 'Changa', sans-serif;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .admin-nav-btn:active { transform: scale(0.97); }

        .scanner-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        #reader { width: 100%; border-radius: 16px; overflow: hidden; border: none !important; }
        
        /* كارت عرض بيانات المخدوم المفصلة المتناسق */
        .result-box {
            background: rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 15px;
            margin-top: 15px;
            font-size: 14px;
            text-align: right;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .student-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .student-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00f2fe;
        }
        .student-info p { margin: 4px 0; font-size: 13px; color: #cbd5e1; }
        .student-info strong { color: white; }
    </style>
</head>
<body>

    <div class="container">
        
        <button class="admin-nav-btn" onclick="window.location.href='admin-quiz.html'">
            👑 تعديل لوحة تحكم أسئلة السبت 🚀
        </button>

        <div class="scanner-card">
            <h2 style="font-family:'Changa'; margin:0 0 15px 0; color:#4facfe;">📸 ماسح تسجيل الحضور</h2>
            <div id="reader"></div>
            
            <div id="result" class="result-box" style="text-align: center; color: #94a3b8;">
                مستعد لقراءة كارت المخدوم... 📱
            </div>
        </div>

    </div>

    <script>
        // بيانات الفايربيز الموحدة الخاصة بيك
        const firebaseConfig = {
            apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
            authDomain: "agazty-feknesty.firebaseapp.com",
            projectId: "agazty-feknesty",
            storageBucket: "agazty-feknesty.firebasestorage.app",
            messagingSenderId: "1065028327259",
            appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let isScanning = true;

        function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning) return;
            isScanning = false; // إيقاف مؤقت لمنع التكرار البايخ

            const resultContainer = document.getElementById('result');
            resultContainer.innerHTML = `<div style="text-align:center;">⏳ جاري جلب بيانات الكود (${decodedText})...</div>`;
            
            // قراءة داتا المخدوم كاملة لايف من جدول الطلاب
            db.collection("students").doc(decodedText).get().then(doc => {
                if(doc.exists) {
                    const student = doc.data();
                    let currentPoints = student.points || 0;
                    let newPoints = currentPoints + 10; // زيادة 10 نقاط تلقائياً للحضور

                    db.collection("students").doc(decodedText).update({
                        points: newPoints
                    }).then(() => {
                        // رندر كارت تفاصيل المخدوم بالكامل مع صورته الشخصية وبياناته المترتبة
                        resultContainer.innerHTML = `
                            <div class="student-profile">
                                <img class="student-avatar" src="${student.avatar || 'https://via.placeholder.com/100'}" alt="Avatar">
                                <div>
                                    <h3 style="margin:0; font-size:16px; color:#2bb673;">✅ تم تسجيل الحضور بنجاح</h3>
                                    <p style="margin:4px 0 0 0; font-weight:bold; color:white; font-size:15px;">${student.name}</p>
                                </div>
                            </div>
                            <div class="student-info">
                                <p><strong>الكود الشخصي:</strong> ${decodedText}</p>
                                <p><strong>موبايل ولى الأمر:</strong> ${student.parentPhone || 'غير مسجل'}</p>
                                <p><strong>رصيد النقاط الحالي:</strong> <span style="color:#00f2fe; font-weight:bold; font-size:15px;">${newPoints} نقطة</span> (+10)</p>
                            </div>
                        `;
                    });
                } else {
                    resultContainer.innerHTML = `<div style="text-align:center; color:#f43f5e; font-weight:bold;">❌ عذراً! هذا الكود غير مسجل بالسيستم.</div>`;
                }
                
                // إعادة فتح السكنر بعد 3 ثواني عشان تسحب الكارت اللي بعده بسلاسة
                setTimeout(() => { isScanning = true; }, 3000);
                
            }).catch(err => {
                resultContainer.innerHTML = `<div style="text-align:center; color:#f43f5e;">❌ خطأ في السيرفر: ${err.message}</div>`;
                setTimeout(() => { isScanning = true; }, 3000);
            });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 230 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
