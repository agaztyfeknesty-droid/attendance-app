<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم الخادم - الحضور والطباعة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    /* ستايل مخصص لجدول الطباعة والكروت داخل صفحة الخادم */
    .admin-section {
      background: #ffffff;
      padding: 20px;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(21, 33, 62, 0.05);
      width: 100%;
      max-width: 600px;
      margin: 20px auto;
      text-align: center;
    }
    .student-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }
    .student-table th, .student-table td {
      border-bottom: 1px solid #eee;
      padding: 12px 8px;
      text-align: center;
      vertical-align: middle;
    }
    .student-table th {
      background-color: #FDF6E8;
      color: #15213E;
      font-weight: 700;
    }
    .print-btn {
      background-color: #36AEE0;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .print-btn:hover { background-color: #2da1d0; }
    
    /* ستايل ورقة الطباعة المخفية - يظهر فقط عند أمر الطباعة */
    #printArea { display: none; }
    @media print {
      body * { display: none !important; }
      #printArea {
        display: flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: white;
      }
      #printArea .card {
        border: 3px dashed #15213E;
        padding: 30px;
        border-radius: 16px;
        text-align: center;
        width: 280px;
      }
      #printArea h2 { font-family: 'Changa', sans-serif; font-size: 22px; margin-bottom: 10px; }
      #printArea p { font-size: 16px; margin: 5px 0; font-weight: bold; }
    }
  </style>
</head>
<body>

  <div style="width: 100%; max-width: 600px; margin: 0 auto;">
    
    <div class="admin-section">
      <img src="logo.png" alt="اللوجو" class="logo" style="width: 60px;">
      <h1>لوحة الخادم الذكية 🔐</h1>
      <p class="sub-greeting">امسح كارت المخدوم لتسجيل الحضور لايف</p>
      
      <div id="reader" style="width: 100%; border-radius: 16px; overflow: hidden; border: none; background: #fafafa;"></div>
      <div id="result" style="margin-top: 15px; font-weight: bold; color: #2BB673;"></div>
    </div>

    <div class="admin-section">
      <h2 style="font-family: 'Changa'; font-size: 18px; text-align: right; color: #15213E; margin-bottom: 5px;">🖨️ كروت الـ QR والطباعة التلقائية</h2>
      <p style="font-size: 12px; color: #6b7280; text-align: right; margin-bottom: 15px;">أي مخدوم يسجل جديد هيظهر هنا فوراً بالـ QR بتاعه وتقدر تطبعه</p>
      
      <div style="overflow-x: auto;">
        <table class="student-table">
          <thead>
            <tr>
              <th>الاسم</th>
              <th>الكود</th>
              <th>الـ QR Code</th>
              <th>التحكم</th>
            </tr>
          </thead>
          <tbody id="studentTableBody">
            </tbody>
        </table>
      </div>
    </div>

  </div>

  <div id="printArea">
    <div class="card">
      <img src="logo.png" style="width: 50px; margin-bottom: 10px;">
      <h2 id="printTitle">إجازتي في كنيستي</h2>
      <p>المخدوم: <span id="printName">--</span></p>
      <p>الكود: <span id="printCode" style="color: #36AEE0;">--</span></p>
      <div id="printQrContainer" style="display: flex; justify-content: center; margin-top: 15px;"></div>
    </div>
  </div>

  <script>
    // إعدادات الفايربيس الخاصة بيك
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // -------------------------------------------------------------
    // أولاً: تشغيل قراءة المخدومين لايف وتوليد الـ QR لكل واحد تلقائياً
    // -------------------------------------------------------------
    db.collection("students").onSnapshot(function(snapshot) {
      const tbody = document.getElementById("studentTableBody");
      tbody.innerHTML = ""; // تصفية الجدول عشان نحدثه بالجديد لايف

      snapshot.forEach(function(doc) {
        const student = doc.data();
        
        // إنشاء سطر جديد في الجدول لكل طالب
        const row = document.createElement("tr");

        // خانة الاسم
        const nameCell = document.createElement("td");
        nameCell.textContent = student.name;
        row.appendChild(nameCell);

        // خانة الكود
        const codeCell = document.createElement("td");
        codeCell.textContent = student.code;
        codeCell.style.fontWeight = "bold";
        codeCell.style.color = "#36AEE0";
        row.appendChild(codeCell);

        // خانة الـ QR Code (هنولد فيها صباع QR صغير للمعاينة)
        const qrCell = document.createElement("td");
        const qrDiv = document.createElement("div");
        qrDiv.style.display = "flex";
        qrDiv.style.justifyContent = "center";
        qrCell.appendChild(qrDiv);
        row.appendChild(qrCell);

        // توليد الـ QR Code الخاص بالطالب فوراً داخل الجدول
        new QRCode(qrDiv, {
          text: student.code,
          width: 50,
          height: 50,
          colorDark : "#15213E",
          colorLight : "#ffffff"
        });

        // خانة زرار الطباعة
        const actionCell = document.createElement("td");
        const printBtn = document.createElement("button");
        printBtn.className = "print-btn";
        printBtn.textContent = "طباعة 🖨️";
        
        // عند الضغط على زرار الطباعة الخاص بالطالب
        printBtn.addEventListener("click", function() {
          triggerPrintCard(student.name, student.code);
        });

        actionCell.appendChild(printBtn);
        row.appendChild(actionCell);

        tbody.appendChild(row);
      });
    });

    // دالة تشغيل طباعة الكارت الفردي
    function triggerPrintCard(name, code) {
      document.getElementById("printName").textContent = name;
      document.getElementById("printCode").textContent = code;
      
      const printQrContainer = document.getElementById("printQrContainer");
      printQrContainer.innerHTML = ""; // تنظيف الـ QR القديم للطباعة

      // توليد QR بحجم كبير مخصص للورقة المطبوعة
      new QRCode(printQrContainer, {
        text: code,
        width: 150,
        height: 150,
        colorDark : "#15213E",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });

      // استدعاء أمر طباعة المتصفح
      setTimeout(() => {
        window.print();
      }, 300);
    }

    // -------------------------------------------------------------
    // ثانياً: تشغيل كاميرا السكانر لتسجيل الحضور (القديمة بتاعتك)
    // -------------------------------------------------------------
    function onScanSuccess(decodedText, decodedResult) {
      document.getElementById("result").innerHTML = `جاري فحص الكود: ${decodedText}.. ⏳`;
      
      const studentRef = db.collection("students").doc(decodedText);
      
      studentRef.get().then((doc) => {
        if (doc.exists) {
          const data = doc.data();
          let currentPoints = data.points || 0;
          let currentStreak = data.streak || 0;
          
          // زيادة النقاط وأيام الالتزام
          currentPoints += 10;
          currentStreak += 1;

          studentRef.update({
            points: currentPoints,
            streak: currentStreak,
            lastAttendanceDate: new Date().toLocaleDateString('en-US')
          }).then(() => {
            document.getElementById("result").innerHTML = `✅ تم تسجيل حضور المخدوم: <br> <span style="color:#15213E;">${data.name}</span> <br> وأخد +10 نقاط! 🎉`;
          });
        } else {
          document.getElementById("result").innerHTML = `❌ الكود ده مش مسجل في السيستم!`;
        }
      }).catch((error) => {
        document.getElementById("result").innerHTML = `❌ حدث خطأ أثناء الاتصال بالسيستم.`;
      });
    }

    function onScanFailure(error) {
      // سيبها فاضية عشان ميعملش إزعاج في الـ Console أثناء البحث عن كود
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
      "reader", { fps: 10, qrbox: 250 }, false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);

  </script>
</body>
</html>
