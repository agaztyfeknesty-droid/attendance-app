<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>استعادة كلمة المرور</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <form id="resetForm">
    <img src="logo.png" alt="اجازتي في كنيستي" class="logo">
    <h1>نسيت كلمة المرور؟</h1>
    <p class="sub-greeting">مش مشكلة، خلينا نتأكد إنك إنت 🙂</p>

    <label for="resetCode">كودك</label>
    <input type="text" id="resetCode" placeholder="مثال: G001" required>

    <label for="resetName">اسمك بالكامل (نفس اسمك المسجل)</label>
    <input type="text" id="resetName" placeholder="مثال: Kirolos" required>

    <label for="resetNewPassword">كلمة المرور الجديدة</label>
    <input type="password" id="resetNewPassword" placeholder="********" required>

    <button type="submit">تغيير كلمة المرور</button>

    <p style="margin-top:18px; font-size:14px;">
      فاكر كلمة السر؟ <a href="index.html" style="color:#36AEE0; font-weight:700;">سجل دخولك من هنا</a>
    </p>
  </form>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBTlBr41Tl-GxnOwOsZvPkg26iQs2SGW3A",
      authDomain: "agazty-feknesty.firebaseapp.com",
      projectId: "agazty-feknesty",
      storageBucket: "agazty-feknesty.firebasestorage.app",
      messagingSenderId: "1065028327259",
      appId: "1:1065028327259:web:c0b7c6f6fe39bc93b9ac7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById("resetForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const code = document.getElementById("resetCode").value.trim();
      const name = document.getElementById("resetName").value.trim();
      const newPassword = document.getElementById("resetNewPassword").value.trim();

      if (!code || !name || !newPassword) {
        alert("لازم تملأ الخانات كلها ❌");
        return;
      }

      db.collection("students").doc(code).get().then(function(docSnap) {
        if (!docSnap.exists) {
          alert("الكود ده مش موجود ❌");
          return;
        }

        const student = docSnap.data();

        // نتأكد إن الاسم مطابق بالظبط (من غير حساسية لحالة الحروف الكبيرة/الصغيرة)
        if (student.name.toLowerCase() !== name.toLowerCase()) {
          alert("الاسم مش مطابق للكود ده ❌");
          return;
        }

        db.collection("students").doc(code).update({
          password: newPassword
        }).then(function() {
          alert("تم تغيير كلمة المرور بنجاح ✅ دلوقتي تقدر تسجل دخولك بيها");
          window.location.href = "index.html";
        });
      });
    });
  </script>

</body>
</html>
